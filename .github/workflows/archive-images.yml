name: Archive BOJ images

# DISABLED (2026-04-29): BOJ site (acmicpc.net) is offline, so this workflow's
# script can no longer fetch anything. Replacement is on-demand:
#   - scripts/import-from-boja.mjs        (new problems from boja.mercury.kr)
#   - scripts/localize-images-from-boja.mjs (per-problem image localization)
# Schedule is removed; only manual dispatch remains. To re-enable later,
# restore the schedule line below.
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 * * * *'   # every hour at :00 (UTC).

jobs:
  archive:
    runs-on: ubuntu-latest
    # Don't loop on the bot's own commits.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run per-problem archive script
        run: node scripts/archive-per-problem.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "백준/" || true
          if git diff --cached --quiet; then
            echo "No changes to commit — nothing to do"
            exit 0
          fi
          git commit -m "chore(archive): per-problem image archival + README augment

          Triggered by hourly schedule."
          git push
