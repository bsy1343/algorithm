name: Archive BOJ images

# Hourly schedule — script is idempotent (skips when nothing to do).
# We do NOT trigger on push to avoid coupling with BaekjoonHub auto-commits.
# If you ever want it to run immediately, use Actions tab → "Run workflow"
# (workflow_dispatch).
on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00 (UTC). 5–15 min drift possible.
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    # Don't loop on the bot's own commits.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run per-problem archive script
        run: node scripts/archive-per-problem.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "백준/" || true
          if git diff --cached --quiet; then
            echo "No changes to commit — nothing to do"
            exit 0
          fi
          git commit -m "chore(archive): per-problem image archival + README augment

          Triggered by hourly schedule."
          git push
