name: Build tree cache

# Rebuilds data/tree-cache.json whenever 백준/ contents change. The viewer
# loads that static file instead of hitting the GitHub Tree API, which
# eliminates the per-IP rate limit and makes initial page load a CDN-cached
# download (~10ms vs ~500ms API call).
#
# Security: this workflow does not interpolate any user-controlled fields
# (PR titles, commit messages, etc.) into shell — only github.actor is used
# in an `if:` expression, which is system-controlled.
# NOTE (2026-04-30): auto-push on every push was causing diverged branches —
# the bot's commit and the user's next push always conflicted. Tree cache is
# now rebuilt by the local pre-commit hook (.githooks/pre-commit), so the
# user's commit already contains the latest tree. Only manual dispatch left
# in case someone wants a force-rebuild from the Actions tab.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - '백준/**'
  #     - 'scripts/build-tree-cache.mjs'
  #     - '.github/workflows/build-tree-cache.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    # Don't loop on the bot's own commits.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build tree cache
        run: node scripts/build-tree-cache.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tree-cache.json
          if git diff --cached --quiet; then
            echo "No tree changes — nothing to commit"
            exit 0
          fi
          git commit -m "chore(tree): rebuild tree-cache.json"
          git push
