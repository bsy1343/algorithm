name: Daily jobs summary

# Daily at KST 10:04 (UTC 01:04). Reads the snapshot produced by the
# 00:04 KST crawl (fetch-jobs.yml) and sends a ntfy summary of every
# job currently open for application. No crawling here.
on:
  schedule:
    - cron: '4 1 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily summary via ntfy
        env:
          NTFY_PASS: ${{ secrets.NTFY_PASS }}
        run: node scripts/notify-daily-summary.mjs
