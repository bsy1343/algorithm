name: Daily jobs summary

# Sends a ntfy summary of every job currently open. Reads the snapshot
# produced by the 00:00 KST crawl (fetch-jobs.yml). No crawling here.
# Triggered by n8n at 09:30 KST via workflow_dispatch (no GitHub
# schedule — n8n is the reliable trigger).
on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily summary via ntfy
        env:
          NTFY_PASS: ${{ secrets.NTFY_PASS }}
        run: node scripts/notify-daily-summary.mjs
