name: Fetch IT job postings

# Daily at KST 00:00 (UTC 15:00 the previous day).
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Cap total runtime — fetch-jobs normally finishes in <10 min. Without this,
    # a hanging SPA page can burn the GitHub Actions 6-hour ceiling (happened
    # 2026-05-13: run cancelled at 6h0m, blocking next day's data).
    timeout-minutes: 25
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Fetch jobs
        timeout-minutes: 15
        run: node scripts/fetch-jobs.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs-latest.json
          if git diff --cached --quiet; then
            echo "No changes - skipping commit"
            exit 0
          fi
          git commit -m "chore(jobs): refresh job postings snapshot"
          git push
