name: Fetch IT job postings

# Daily at KST 00:04 (UTC 15:04 the previous day). Avoid on-the-hour
# UTC slots — GitHub-hosted runners are oversubscribed at :00 and
# scheduled workflows can be delayed by hours or skipped silently.
# Offsetting by a few minutes greatly improves on-time firing.
# This workflow crawls only; the daily summary and new-jobs notifications
# live in separate workflows that run later in the day.
on:
  schedule:
    - cron: '4 15 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Cap total runtime — fetch-jobs normally finishes in <10 min. Without this,
    # a hanging SPA page can burn the GitHub Actions 6-hour ceiling (happened
    # 2026-05-13: run cancelled at 6h0m, blocking next day's data).
    timeout-minutes: 25
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Fetch jobs
        timeout-minutes: 15
        run: node scripts/fetch-jobs.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs-latest.json
          if git diff --cached --quiet; then
            echo "No changes - skipping commit"
            exit 0
          fi
          git commit -m "chore(jobs): refresh job postings snapshot"
          # The runner checked out main some minutes ago; if the user pushed
          # in the meantime, a straight push gets rejected. Rebase onto the
          # latest remote and retry once.
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then exit 0; fi
            echo "push failed (attempt $attempt) — retrying"
            sleep 5
          done
          exit 1
