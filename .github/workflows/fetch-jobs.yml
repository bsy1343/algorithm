name: Fetch IT job postings

# Crawls IT job postings and commits data/jobs-latest.json.
# Triggered by n8n (Mac mini) at 00:00 KST via workflow_dispatch.
# GitHub's own schedule is intentionally omitted — it fired 1-4h late;
# n8n is the sole, on-time trigger.
on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Cap total runtime — fetch-jobs normally finishes in <10 min. Without this,
    # a hanging SPA page can burn the GitHub Actions 6-hour ceiling (happened
    # 2026-05-13: run cancelled at 6h0m, blocking next day's data).
    timeout-minutes: 25
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Fetch jobs
        timeout-minutes: 15
        run: node scripts/fetch-jobs.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs-latest.json
          if git diff --cached --quiet; then
            echo "No changes - skipping commit"
            exit 0
          fi
          git commit -m "chore(jobs): refresh job postings snapshot"
          # The "Install Playwright" step runs `npm init -y`, which rewrites
          # the tracked package.json. That unstaged change made the old
          # `git pull --rebase` abort with "You have unstaged changes", so a
          # concurrent push could never be integrated and every attempt
          # failed (seen 2026-05-18). The snapshot is already committed, so
          # discard the npm noise, then fetch + rebase explicitly and abort
          # cleanly on conflict so each retry starts from a clean state.
          for attempt in 1 2 3; do
            git checkout -- . 2>/dev/null || true
            git fetch origin main --quiet || true
            if git rebase origin/main; then
              if git push; then
                echo "pushed (attempt $attempt)"
                exit 0
              fi
            else
              git rebase --abort 2>/dev/null || true
            fi
            echo "push failed (attempt $attempt) — retrying"
            sleep 5
          done
          exit 1
