name: Fetch IT job postings

# Every 3 days at KST 00:00 (UTC 15:00 previous day).
# Cron uses fixed dates 1,4,7,...28 to keep exactly 3-day spacing across month boundaries.
on:
  schedule:
    - cron: '0 15 1,4,7,10,13,16,19,22,25,28 * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Fetch jobs
        run: node scripts/fetch-jobs.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs-latest.json
          if git diff --cached --quiet; then
            echo "No changes - skipping commit"
            exit 0
          fi
          git commit -m "chore(jobs): refresh job postings snapshot"
          git push
