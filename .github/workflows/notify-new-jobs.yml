name: Notify new jobs (vs yesterday)

# Compares data/jobs-latest.json to the previous commit that touched it
# and pushes a "new postings" ntfy summary. Triggered by n8n at 13:30
# KST via workflow_dispatch (no GitHub schedule — n8n is the reliable
# trigger).
on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Need enough history to find the previous commit touching jobs-latest.json.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Notify new jobs via ntfy
        env:
          NTFY_PASS: ${{ secrets.NTFY_PASS }}
        run: node scripts/notify-new-jobs.mjs
