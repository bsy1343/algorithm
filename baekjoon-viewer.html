<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>백준 풀이 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --bg4: #21262d;
    --border: #30363d;
    --border2: #3d444d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --accent: #58a6ff;
    --accent-bg: rgba(88,166,255,0.1);
    --gold: #d29922;
    --gold-bg: rgba(210,153,34,0.12);
    --silver: #79c0ff;
    --silver-bg: rgba(121,192,255,0.1);
    --bronze: #f0883e;
    --bronze-bg: rgba(240,136,62,0.1);
    --green: #3fb950;
    --green-bg: rgba(63,185,80,0.1);
    --radius: 8px;
    --radius-sm: 5px;
    --font: 'Pretendard', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }

  /* ── Layout ── */
  .app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 52px 1fr; height: 100vh; }

  /* ── Topbar ── */
  .topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .topbar-logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text2); white-space: nowrap; }
  .topbar-logo span { color: var(--accent); }
  .topbar-inputs { display: flex; gap: 8px; flex: 1; max-width: 640px; }
  .topbar-inputs input {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 5px 10px; outline: none; transition: border-color 0.15s;
  }
  .topbar-inputs input:focus { border-color: var(--accent); }
  .topbar-inputs input::placeholder { color: var(--text3); }
  #inp-owner { width: 120px; }
  #inp-repo { width: 140px; }
  #inp-token { flex: 1; }
  .load-btn {
    padding: 5px 14px; font-size: 12px; font-family: var(--mono);
    background: var(--accent-bg); border: 1px solid var(--accent);
    color: var(--accent); border-radius: var(--radius-sm);
    cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  .load-btn:hover { background: rgba(88,166,255,0.2); }
  .load-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #status { font-size: 11px; color: var(--text3); white-space: nowrap; font-family: var(--mono); }
  #status.err { color: #f85149; }
  .stat-chip {
    margin-left: auto; font-size: 11px; font-family: var(--mono);
    color: var(--text2); white-space: nowrap;
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .tier-tabs {
    display: flex; overflow-x: auto; border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .tier-tabs::-webkit-scrollbar { display: none; }
  .tier-tab {
    padding: 8px 12px; font-size: 11px; font-family: var(--mono);
    cursor: pointer; white-space: nowrap; color: var(--text3);
    border-bottom: 2px solid transparent; transition: color 0.15s;
  }
  .tier-tab:hover { color: var(--text2); }
  .tier-tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .search-box { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .search-box input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: var(--font);
    font-size: 12px; padding: 5px 8px; outline: none;
  }
  .search-box input:focus { border-color: var(--border2); }
  .search-box input::placeholder { color: var(--text3); }

  .problem-list { flex: 1; overflow-y: auto; padding: 4px; }
  .problem-list::-webkit-scrollbar { width: 4px; }
  .problem-list::-webkit-scrollbar-track { background: transparent; }
  .problem-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .problem-item {
    padding: 9px 10px; border-radius: var(--radius-sm);
    cursor: pointer; margin-bottom: 1px;
    border: 1px solid transparent;
    transition: background 0.1s, border-color 0.1s;
  }
  .problem-item:hover { background: var(--bg3); }
  .problem-item.active { background: var(--bg3); border-color: var(--border2); }
  .pi-top { display: flex; align-items: center; gap: 6px; }
  .pi-num { font-size: 10px; font-family: var(--mono); color: var(--text3); }
  .pi-tier-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pi-title { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pi-meta { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--mono); padding-left: 12px; }

  .empty-sidebar { padding: 24px 12px; text-align: center; font-size: 12px; color: var(--text3); line-height: 1.8; }

  /* ── Main ── */
  .main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  .main-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); flex-wrap: wrap; min-height: 52px;
  }
  .main-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .tier-badge {
    font-size: 10px; font-family: var(--mono); font-weight: 500;
    padding: 2px 8px; border-radius: 20px; border: 1px solid;
  }
  .badge-gold { color: var(--gold); border-color: var(--gold); background: var(--gold-bg); }
  .badge-silver { color: var(--silver); border-color: var(--silver); background: var(--silver-bg); }
  .badge-bronze { color: var(--bronze); border-color: var(--bronze); background: var(--bronze-bg); }
  .badge-default { color: var(--text2); border-color: var(--border2); background: var(--bg3); }
  .badge-green { color: var(--green); border-color: var(--green); background: var(--green-bg); }

  .view-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg2); padding: 0 20px; gap: 0;
  }
  .view-tab {
    padding: 9px 16px; font-size: 12px; font-family: var(--mono);
    cursor: pointer; color: var(--text3);
    border-bottom: 2px solid transparent; transition: color 0.15s;
  }
  .view-tab:hover { color: var(--text2); }
  .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main-content { flex: 1; overflow-y: auto; padding: 20px; }
  .main-content::-webkit-scrollbar { width: 4px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Empty state ── */
  .empty-main {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 10px;
    color: var(--text3); font-size: 13px;
  }
  .empty-main .big { font-size: 40px; opacity: 0.3; }

  /* ── Meta cards ── */
  .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px,1fr)); gap: 8px; margin-bottom: 20px; }
  .meta-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .meta-label { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }
  .meta-val { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--mono); }

  /* ── Problem sections ── */
  .prob-section { margin-bottom: 20px; }
  .prob-section-title {
    font-size: 12px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 10px; font-family: var(--mono);
    display: flex; align-items: center; gap: 8px;
  }
  .prob-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .prob-body { font-size: 14px; color: var(--text2); line-height: 1.8; }
  .prob-body ul { padding-left: 18px; }
  .prob-body li { margin-bottom: 2px; }
  .prob-body p + p { margin-top: 8px; }

  /* ── IO grid ── */
  .io-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .io-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .io-label { font-size: 10px; font-family: var(--mono); color: var(--text3); margin-bottom: 8px; font-weight: 500; }
  .io-box pre { font-size: 13px; color: var(--text); font-family: var(--mono); white-space: pre-wrap; line-height: 1.6; }

  /* ── Code ── */
  .code-wrap {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }
  .code-lang { font-size: 11px; font-family: var(--mono); color: var(--text3); }
  .copy-btn {
    font-size: 11px; font-family: var(--mono);
    color: var(--text3); background: none; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 3px 10px;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--border2); }
  .code-wrap pre {
    padding: 16px; font-size: 13px; color: var(--text);
    font-family: var(--mono); overflow-x: auto;
    white-space: pre; line-height: 1.7;
  }
  .code-wrap pre::-webkit-scrollbar { height: 4px; }
  .code-wrap pre::-webkit-scrollbar-track { background: var(--bg2); }
  .code-wrap pre::-webkit-scrollbar-thumb { background: var(--border); }

  .loading-msg { font-size: 12px; color: var(--text3); font-family: var(--mono); padding: 16px 0; }

  /* ── README HTML content ── */
  .prob-body img { max-width: 100%; border-radius: var(--radius); margin: 10px 0; display: block; }
  .prob-body p { margin-bottom: 8px; color: var(--text2); font-size: 14px; line-height: 1.8; }
  .prob-body ul, .prob-body ol { padding-left: 20px; color: var(--text2); font-size: 14px; line-height: 1.8; margin-bottom: 8px; }
  .prob-body li { margin-bottom: 4px; }
  .prob-body sub, .prob-body sup { font-size: 11px; }
  .prob-body strong, .prob-body b { color: var(--text); font-weight: 600; }
  .prob-body code { font-family: var(--mono); font-size: 12px; background: var(--bg3); padding: 1px 5px; border-radius: 3px; color: var(--accent); }

  /* ── Java syntax highlight (basic) ── */
  .kw { color: #ff7b72; }
  .cm { color: #8b949e; font-style: italic; }
  .str { color: #a5d6ff; }
  .num { color: #79c0ff; }
  .ann { color: #e3b341; }
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-logo">boj<span>.</span>viewer</div>
    <div class="topbar-inputs">
      <input id="inp-owner" placeholder="username" />
      <input id="inp-repo" placeholder="repo-name" />
      <input id="inp-token" type="password" placeholder="GitHub Token (optional — public 레포는 불필요)" />
    </div>
    <button class="load-btn" id="load-btn" onclick="loadRepo()">load ↵</button>
    <span id="status"></span>
    <span class="stat-chip" id="stat-chip"></span>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="tier-tabs" id="tier-tabs"></div>
    <div class="search-box">
      <input id="search-inp" placeholder="문제 번호 / 제목 검색..." oninput="renderList()" />
    </div>
    <div class="problem-list" id="problem-list">
      <div class="empty-sidebar">
        username과 repo를 입력하고<br>load를 눌러주세요
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header" id="main-header">
      <div class="empty-main" style="width:100%;padding:0">
        <span style="font-size:13px;color:var(--text3)">문제를 선택하세요</span>
      </div>
    </div>
    <div class="view-tabs" id="view-tabs" style="display:none">
      <div class="view-tab active" onclick="switchTab('problem')">문제</div>
      <div class="view-tab" onclick="switchTab('code')">내 풀이</div>
      <div class="view-tab" onclick="switchTab('io')">예제 입출력</div>
    </div>
    <div class="main-content" id="main-content">
      <div class="empty-main">
        <div class="big">⌨</div>
        <div>풀이를 복습할 문제를 선택하세요</div>
      </div>
    </div>
  </main>
</div>

<script>
let allProblems = [];
let currentTier = 'ALL';
let currentProblem = null;
let currentTab = 'problem';
let owner = '', repo = '', token = '';

function hdrs() {
  const h = { Accept: 'application/vnd.github.v3+json' };
  if (token) h.Authorization = 'Bearer ' + token;
  return h;
}

async function loadRepo() {
  owner = document.getElementById('inp-owner').value.trim();
  repo  = document.getElementById('inp-repo').value.trim();
  token = document.getElementById('inp-token').value.trim();
  if (!owner || !repo) { setStatus('username과 repo를 입력해주세요', true); return; }

  const btn = document.getElementById('load-btn');
  btn.disabled = true;
  setStatus('트리 로딩 중...');
  document.getElementById('stat-chip').textContent = '';

  try {
    // main 브랜치 먼저 시도, 실패하면 master
    let data = await fetchTree('main');
    if (!data) data = await fetchTree('master');
    if (!data) throw new Error('브랜치를 찾을 수 없습니다 (main/master)');
    parseTree(data.tree);
    setStatus('');
    document.getElementById('stat-chip').textContent = `${allProblems.length}문제`;
  } catch(e) {
    setStatus(e.message, true);
  } finally {
    btn.disabled = false;
  }
}

async function fetchTree(branch) {
  const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
  const res = await fetch(url, { headers: hdrs() });
  if (res.status === 404) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

function parseTree(tree) {
  const map = {};
  // 백준/난이도/번호. 제목/파일명 패턴
  const re = /^백준\/([^/]+)\/(\d+)\.\s*([^/]+?)\/(.+)$/;

  tree.forEach(item => {
    const m = item.path.match(re);
    if (!m) return;
    const [, tier, num, title, fname] = m;
    const key = `${tier}||${num}`;
    if (!map[key]) map[key] = { tier, num, title: title.trim(), files: {} };
    const fl = fname.toLowerCase();
    if (fl === 'readme.md') map[key].files.readme = item.path;
    else if (fl.endsWith('.java')) map[key].files.java = item.path;
    else if (/^input\d*\.txt$/.test(fl)) {
      (map[key].files.inputs = map[key].files.inputs || []).push(item.path);
    } else if (/^output\d*\.txt$/.test(fl)) {
      (map[key].files.outputs = map[key].files.outputs || []).push(item.path);
    }
  });

  allProblems = Object.values(map).sort((a,b) => +a.num - +b.num);
  buildTierTabs();
  renderList();
}

const TIER_ORDER = ['Platinum','Gold','Silver','Bronze','Unrated'];

function buildTierTabs() {
  const tiers = [...new Set(allProblems.map(p => p.tier))];
  tiers.sort((a,b) => {
    const ia = TIER_ORDER.findIndex(t => a.startsWith(t));
    const ib = TIER_ORDER.findIndex(t => b.startsWith(t));
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
  });
  const all = ['ALL', ...tiers];
  document.getElementById('tier-tabs').innerHTML = all.map(t =>
    `<div class="tier-tab${t===currentTier?' active':''}" onclick="selectTier('${t}')">${t}</div>`
  ).join('');
}

function selectTier(tier) {
  currentTier = tier;
  document.querySelectorAll('.tier-tab').forEach(el => {
    el.classList.toggle('active', el.textContent === tier);
  });
  renderList();
}

function renderList() {
  const q = document.getElementById('search-inp').value.trim().toLowerCase();
  let list = currentTier === 'ALL' ? allProblems : allProblems.filter(p => p.tier === currentTier);
  if (q) list = list.filter(p => p.num.includes(q) || p.title.toLowerCase().includes(q));

  const el = document.getElementById('problem-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-sidebar">결과 없음</div>';
    return;
  }
  el.innerHTML = list.map(p => {
    const dotColor = tierColor(p.tier);
    const isActive = currentProblem?.num === p.num && currentProblem?.tier === p.tier;
    const ioCount = p.files.inputs?.length || 0;
    return `<div class="problem-item${isActive?' active':''}" onclick="selectProblem('${p.tier}','${p.num}')">
      <div class="pi-top">
        <div class="pi-tier-dot" style="background:${dotColor}"></div>
        <div class="pi-num">#${p.num}</div>
        <div class="pi-title">${esc(p.title)}</div>
      </div>
      <div class="pi-meta">${p.tier}${ioCount ? ' · 예제 '+ioCount+'개' : ''}</div>
    </div>`;
  }).join('');
}

function tierColor(tier) {
  if (tier.startsWith('Gold')) return '#d29922';
  if (tier.startsWith('Platinum')) return '#3fb950';
  if (tier.startsWith('Silver')) return '#79c0ff';
  if (tier.startsWith('Bronze')) return '#f0883e';
  return '#484f58';
}

function tierBadgeClass(tier) {
  if (tier.startsWith('Gold')) return 'badge-gold';
  if (tier.startsWith('Silver')) return 'badge-silver';
  if (tier.startsWith('Bronze')) return 'badge-bronze';
  if (tier.startsWith('Platinum')) return 'badge-green';
  return 'badge-default';
}

async function selectProblem(tier, num) {
  const p = allProblems.find(x => x.num===num && x.tier===tier);
  if (!p) return;
  currentProblem = p;
  currentTab = 'problem';
  renderList();

  // header
  document.getElementById('main-header').innerHTML = `
    <div class="main-title">${esc(p.num + '. ' + p.title)}</div>
    <span class="tier-badge ${tierBadgeClass(p.tier)}">${esc(p.tier)}</span>
  `;
  const vtEl = document.getElementById('view-tabs');
  vtEl.style.display = 'flex';
  vtEl.querySelectorAll('.view-tab').forEach((t,i) => t.classList.toggle('active', i===0));

  setContent('<div class="loading-msg">로딩 중...</div>');

  try {
    if (p.files.readme && !p._readme) p._readme = await fetchFile(p.files.readme);
    renderTab('problem');
  } catch(e) {
    setContent(`<div style="color:#f85149;font-size:12px;font-family:var(--mono)">${esc(e.message)}</div>`);
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.view-tab').forEach((t,i) => {
    t.classList.toggle('active', ['problem','code','io'][i]===tab);
  });
  renderTab(tab);
}

async function renderTab(tab) {
  const p = currentProblem;
  if (!p) return;

  if (tab === 'problem') {
    if (!p._readme) { setContent('<div class="loading-msg">README 없음</div>'); return; }
    setContent(renderReadme(p._readme));
  }
  else if (tab === 'code') {
    if (!p.files.java) { setContent('<div class="loading-msg">.java 파일 없음</div>'); return; }
    setContent('<div class="loading-msg">코드 로딩 중...</div>');
    try {
      if (!p._java) p._java = await fetchFile(p.files.java);
      const highlighted = javaHL(p._java);
      setContent(`
        <div class="code-wrap">
          <div class="code-header">
            <span class="code-lang">Java</span>
            <button class="copy-btn" onclick="copyCode()">copy</button>
          </div>
          <pre id="code-pre">${highlighted}</pre>
        </div>`);
    } catch(e) { setContent(`<div style="color:#f85149;font-family:var(--mono);font-size:12px">${esc(e.message)}</div>`); }
  }
  else if (tab === 'io') {
    if (!p.files.inputs?.length) { setContent('<div class="loading-msg">예제 파일 없음</div>'); return; }
    setContent('<div class="loading-msg">예제 로딩 중...</div>');
    try {
      const inputs  = [...(p.files.inputs||[])].sort();
      const outputs = [...(p.files.outputs||[])].sort();
      if (!p._inputs) p._inputs = await Promise.all(inputs.map(fetchFile));
      if (!p._outputs) p._outputs = await Promise.all(outputs.map(fetchFile));
      let html = '';
      p._inputs.forEach((inp, i) => {
        html += `<div class="io-pair">
          <div class="io-box"><div class="io-label">입력 ${i+1}</div><pre>${esc(inp.trim())}</pre></div>
          <div class="io-box"><div class="io-label">출력 ${i+1}</div><pre>${esc((p._outputs[i]||'').trim())}</pre></div>
        </div>`;
      });
      setContent(html);
    } catch(e) { setContent(`<div style="color:#f85149;font-family:var(--mono);font-size:12px">${esc(e.message)}</div>`); }
  }
}

function renderReadme(md) {
  const meta = {};
  const lines = md.split('\n');

  // 메타 파싱
  lines.forEach((l, i) => {
    const mem = l.match(/메모리[:\s]+([\d,]+ KB)/); if (mem) meta.memory = mem[1];
    const tim = l.match(/시간[:\s]+([\d,]+ ms)/);   if (tim) meta.time = tim[1];
    if (/^\*\*분류\*\*/.test(l) || l.trim() === '분류') {
      const nx = lines[i+1]?.trim();
      if (nx && !nx.startsWith('#') && !nx.startsWith('**') && nx) meta.category = nx;
    }
    if (/^\*\*제출 일자\*\*/.test(l)) {
      const nx = lines[i+1]?.trim(); if (nx) meta.date = nx;
    }
  });

  // 섹션 파싱 (## 헤딩 기준)
  const sections = {};
  const sectionKeys = ['문제 설명','문제','입력','출력','힌트','노트','제한'];
  let cur = null;
  lines.forEach(l => {
    const hm = l.match(/^#+\s+(.+)/);
    if (hm) {
      const ht = hm[1].trim();
      cur = sectionKeys.find(k => ht.includes(k)) || null;
      if (cur && !sections[cur]) sections[cur] = '';
      return;
    }
    if (cur) sections[cur] += l + '\n';
  });

  let html = '';

  // 메타 카드
  if (Object.keys(meta).length) {
    html += '<div class="meta-grid">';
    if (meta.memory)   html += `<div class="meta-card"><div class="meta-label">메모리</div><div class="meta-val">${esc(meta.memory)}</div></div>`;
    if (meta.time)     html += `<div class="meta-card"><div class="meta-label">시간</div><div class="meta-val">${esc(meta.time)}</div></div>`;
    if (meta.category) html += `<div class="meta-card"><div class="meta-label">분류</div><div class="meta-val">${esc(meta.category)}</div></div>`;
    if (meta.date)     html += `<div class="meta-card"><div class="meta-label">제출일</div><div class="meta-val">${esc(meta.date)}</div></div>`;
    html += '</div>';
  }

  const displaySections = [
    ['문제 설명', '문제'],
    ['입력'],
    ['출력'],
    ['제한'],
    ['힌트'],
    ['노트'],
  ];

  displaySections.forEach(keys => {
    const key = keys.find(k => sections[k]?.trim());
    if (!key) return;
    const body = sections[key].trim();
    if (!body) return;
    const label = key === '문제 설명' ? '문제' : key;

    // 본문이 HTML 태그를 포함하면 → HTML로 직접 렌더링
    // 마크다운이면 → 간단 변환
    const rendered = containsHtmlTags(body)
      ? sanitizeReadmeHtml(body)
      : mdToHtml(body);

    html += `<div class="prob-section">
      <div class="prob-section-title">${label}</div>
      <div class="prob-body">${rendered}</div>
    </div>`;
  });

  // 섹션 파싱 실패 시 전체 본문을 HTML/마크다운으로 렌더링
  if (!html || Object.keys(sections).length === 0) {
    const body = lines.filter(l => !l.startsWith('#') && !l.match(/^\*\*(메모리|시간|분류|제출)/)).join('\n').trim();
    const rendered = containsHtmlTags(body) ? sanitizeReadmeHtml(body) : mdToHtml(body);
    html += `<div class="prob-body">${rendered}</div>`;
  }

  return html;
}

// HTML 태그 포함 여부 체크
function containsHtmlTags(text) {
  return /<(p|div|ul|ol|li|img|sub|sup|strong|b|br|table|tr|td|th|h[1-6]|pre|code)\b/i.test(text);
}

// README HTML을 안전하게 렌더링 (이미지 허용, 스크립트 제거)
function sanitizeReadmeHtml(html) {
  // script / style 태그 제거
  let clean = html
    .replace(/<script[\s\S]*?<\/script>/gi, '')
    .replace(/<style[\s\S]*?<\/style>/gi, '')
    .replace(/on\w+="[^"]*"/gi, '')
    .replace(/on\w+='[^']*'/gi, '');

  // acmicpc.net 이미지 경로 보정 (상대경로 → 절대경로)
  clean = clean.replace(/src="\/upload\//g, 'src="https://www.acmicpc.net/upload/');
  clean = clean.replace(/src='\/upload\//g, "src='https://www.acmicpc.net/upload/");

  return clean;
}

// 간단 마크다운 → HTML 변환
function mdToHtml(md) {
  return md.split('\n').map(l => {
    if (/^[-*]\s/.test(l)) return `<li>${l.replace(/^[-*]\s*/, '')}</li>`;
    if (l.trim() === '')   return '<br>';
    // 인라인 마크다운
    let t = l
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
    return `<p>${t}</p>`;
  }).join('');
}

function javaHL(code) {
  const keywords = ['public','private','protected','class','interface','extends','implements',
    'new','return','if','else','for','while','do','switch','case','break','continue','default',
    'import','package','static','final','void','int','long','double','float','boolean','char',
    'byte','short','String','null','true','false','this','super','try','catch','finally','throw',
    'throws','instanceof','abstract','synchronized','volatile','transient','native','enum',
    'var','ArrayList','LinkedList','HashMap','HashSet','Scanner','Arrays','Math','System','out'];

  return esc(code)
    .replace(/\/\/[^\n]*/g, m => `<span class="cm">${m}</span>`)
    .replace(/\/\*[\s\S]*?\*\//g, m => `<span class="cm">${m}</span>`)
    .replace(/(&quot;(?:[^&]|&(?!quot;))*&quot;)/g, m => `<span class="str">${m}</span>`)
    .replace(/(@\w+)/g, m => `<span class="ann">${m}</span>`)
    .replace(/\b(\d+[lLdDfF]?)\b/g, m => `<span class="num">${m}</span>`)
    .replace(new RegExp(`\\b(${keywords.join('|')})\\b`, 'g'), m => `<span class="kw">${m}</span>`);
}

async function fetchFile(path) {
  const encoded = path.split('/').map(encodeURIComponent).join('/');
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encoded}`;
  const res = await fetch(url, { headers: hdrs() });
  if (!res.ok) throw new Error(`파일 로드 실패 (${res.status}): ${path.split('/').pop()}`);
  const data = await res.json();
  return decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
}

function copyCode() {
  const p = currentProblem;
  if (!p?._java) return;
  navigator.clipboard.writeText(p._java).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'copied!'; setTimeout(() => btn.textContent = 'copy', 1500); }
  });
}

function setContent(html) {
  document.getElementById('main-content').innerHTML = html;
}

function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter 키로 로드
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (document.activeElement?.closest('.topbar-inputs'))) loadRepo();
});
