      el.className = 'stat-chip' + (tone ? ' ' + tone : '');
    },
  };

  /* ========================================================
   * ActionBar — "반례 찾기" + "BOJ 원문" buttons in main-header.
   * Note: testcase.ac API CORS only allows their own origin, so we
   * cannot probe registry status from the browser. The button is
   * always enabled; if the problem isn't registered the user sees
   * a 404 on testcase.ac after clicking — acceptable trade-off.
   * ======================================================== */
  const ActionBar = {
    render(p) {
      const slot = document.getElementById('action-bar');
      if (!slot) return;
      slot.innerHTML = `
        <button class="action-btn" id="ac-stress" title="testcase.ac에서 반례 찾기 (등록되지 않은 문제는 새 탭에서 404 표시)">반례 찾기 →</button>
        <a class="action-btn muted" id="ac-boj" href="https://www.acmicpc.net/problem/${esc(p.num)}" target="_blank" rel="noopener">BOJ 원문 →</a>
      `;
      const btn = slot.querySelector('#ac-stress');
      btn.addEventListener('click', async () => {
        const draft = State.getDraft(p);
        const code = draft?.code ?? '';
        const url = `https://next.testcase.ac/problems/boj/${encodeURIComponent(p.num)}`;
        if (!code.trim()) {
          window.open(url, '_blank', 'noopener');
          Toast.show('내 풀이가 비어있습니다 — 빈 채로 testcase.ac 열림');
          return;
        }
        try {
          await navigator.clipboard.writeText(code);
          Toast.show('코드 복사 완료 → testcase.ac 새 탭');
        } catch {
          Toast.show('코드 복사 실패. 수동으로 복사해 주세요.', { error: true });
        }
        window.open(url, '_blank', 'noopener');
      });
    },
  };

  /* ========================================================
   * JobsView — IT job postings: calendar + list + config panel.
   * Data fetched from data/jobs-latest.json (refreshed every 3 days
   * by .github/workflows/fetch-jobs.yml).
   * ======================================================== */
  const JobsView = {
    state: { config: null, snapshot: null, viewMonth: null, selectedDate: null },

    COMPANY_COLORS: {
      daangn: '#ff6f0f', autoever: '#1f51a3', toss: '#3182f6',
      kakao: '#fee500', naver: '#03c75a', lgcns: '#a50034',
      lguplus: '#e6005c', hyundai: '#002c5f', cj: '#cc0033',
      skt: '#ea002c', skax: '#ff7a00', skhynix: '#ff0000',
    },

    async load() {
      try {
        const [cfg, snap] = await Promise.all([
          fetch('data/jobs-config.json').then(r => r.ok ? r.json() : null),
          fetch('data/jobs-latest.json').then(r => r.ok ? r.json() : null),
        ]);
        this.state.config = cfg;
        this.state.snapshot = snap;
      } catch (e) {
        console.warn('[Jobs] load failed:', e);
      }
    },

    parseDeadline(s) {
      if (!s) return null;
      // 2026.05.30 / 2026-05-30
      let m = s.match(/(\d{4})[.-](\d{1,2})[.-](\d{1,2})/);
      if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
      // 2026년 5월 30일
      m = s.match(/(\d{4})년\s?(\d{1,2})월\s?(\d{1,2})일/);
      if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
      const dd = s.match(/^D-(\d+)$/);
      if (dd) {
        const t = new Date();
        t.setDate(t.getDate() + +dd[1]);
        t.setHours(0, 0, 0, 0);
        return t;
      }
      return null;
    },

    groupByDate() {
      const map = {};
      const jobs = this.state.snapshot?.jobs || [];
      for (const j of jobs) {
        // Deadline is already ISO yyyy-mm-dd from fetcher — use directly
        // (toISOString would shift KST midnight back a day in UTC).
        if (!j.deadline || !/^\d{4}-\d{2}-\d{2}$/.test(j.deadline)) continue;
        (map[j.deadline] = map[j.deadline] || []).push(j);
      }
      return map;
    },

    async render() {
      await this.load();
      const main = document.querySelector('.main');
      if (!main) return;
      const snap = this.state.snapshot;
      if (!snap) {
        main.innerHTML = `<div class="jobs-screen"><div class="jobs-title">채용</div>
          <p style="color:var(--text3);margin-top:12px;font-family:var(--mono);font-size:12px;">
          아직 데이터 없음. <code>data/jobs-latest.json</code>이 생성되면 표시됩니다.<br>
          (3일마다 GitHub Actions가 자동 갱신, 또는 <code>node scripts/fetch-jobs.mjs</code> 수동 실행)
          </p></div>`;
        return;
      }
      if (!this.state.viewMonth) this.state.viewMonth = new Date();
      const fetched = new Date(snap.fetchedAt);
      const ago = Math.floor((Date.now() - fetched.getTime()) / (24*3600*1000));

      main.innerHTML = `
        <div class="jobs-screen">
          <div class="jobs-header">
            <div class="jobs-title">📅 채용</div>
            <div class="jobs-meta">
              총 <span class="ok">${snap.totalCount.toLocaleString()}</span>건
              · 마지막 갱신 ${ago === 0 ? '오늘' : ago + '일 전'} (${fetched.toLocaleString('ko-KR')})
              ${snap.errors?.length ? `· <span style="color:var(--danger)">에러 ${snap.errors.length}</span>` : ''}
            </div>
          </div>
          <div class="jobs-layout">
            <div class="calendar-card" id="calendar-card"></div>
            <div class="jobs-side">
              <div class="jobs-list-card" id="jobs-list-card"></div>
              <div class="jobs-list-card" id="standing-jobs-card"></div>
            </div>
          </div>
          <div class="jobs-config-panel" id="jobs-config-panel"></div>
        </div>
      `;
      this.renderCalendar();
      this.renderList();
      this.renderConfigPanel();
    },

    renderCalendar() {
      const root = document.getElementById('calendar-card');
      if (!root) return;
      const vm = this.state.viewMonth;
      const year = vm.getFullYear(), month = vm.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      const startWday = first.getDay();
      const today = new Date(); today.setHours(0,0,0,0);
      const grouped = this.groupByDate();

      const pad = n => String(n).padStart(2, '0');
      let cells = '';
      // Trailing days from prev month
      for (let i = 0; i < startWday; i++) {
        const d = new Date(year, month, -startWday + i + 1);
        cells += `<div class="cal-cell dim"><div class="cal-day">${d.getDate()}</div></div>`;
      }
      for (let day = 1; day <= last.getDate(); day++) {
        const d = new Date(year, month, day);
        // Local-date key (avoids UTC shift that would push KST midnight back a day).
        const key = `${year}-${pad(month + 1)}-${pad(day)}`;
        const jobs = grouped[key] || [];
        const isToday = d.getTime() === today.getTime();
        const sel = this.state.selectedDate === key;
        const dots = jobs.slice(0, 6).map(j =>
          `<span class="cal-dot" style="background:${this.COMPANY_COLORS[j.companyId] || '#888'}"></span>`).join('');
        cells += `<div class="cal-cell ${jobs.length ? 'has-jobs' : ''} ${isToday ? 'today' : ''} ${sel ? 'active' : ''}" data-date="${key}">
          <div class="cal-day">${day}</div>
          <div class="cal-dots">${dots}</div>
          ${jobs.length > 6 ? `<div class="cal-count">+${jobs.length - 6}</div>` : ''}
        </div>`;
      }

      root.innerHTML = `
        <div class="cal-nav">
          <button id="cal-prev">&lt;</button>
          <div class="month">${year}년 ${month + 1}월</div>
          <button id="cal-today">오늘</button>
          <button id="cal-next">&gt;</button>
        </div>
        <div class="cal-grid">
          ${['일','월','화','수','목','금','토'].map(d => `<div class="cal-dow">${d}</div>`).join('')}
          ${cells}
        </div>
      `;
      document.getElementById('cal-prev').onclick = () => { vm.setMonth(month - 1); this.renderCalendar(); };
      document.getElementById('cal-next').onclick = () => { vm.setMonth(month + 1); this.renderCalendar(); };
      document.getElementById('cal-today').onclick = () => { this.state.viewMonth = new Date(); this.state.selectedDate = null; this.renderCalendar(); this.renderList(); };
      // Sync right-panel height to calendar so urgent + standing cards split that height (and scroll inside).
      requestAnimationFrame(() => {
        const sideEl = document.querySelector('.jobs-side');
        if (sideEl) sideEl.style.maxHeight = root.offsetHeight + 'px';
      });
      // Click handlers on every non-dim cell — even no-deadline days are
      // useful: clicking shows all jobs still open as of that date.
      root.querySelectorAll('.cal-cell:not(.dim)').forEach(el => {
        el.onclick = () => {
          this.state.selectedDate = el.dataset.date;
          this.renderCalendar();
          this.renderList();
        };
      });
    },

    jobItemHtml(j) {
      const d = this.parseDeadline(j.deadline);
      const days = d ? Math.ceil((d - new Date()) / (24*3600*1000)) : null;
      const urgent = days !== null && days <= 7;
      let dlText;
      if (days !== null) dlText = `D-${Math.max(0, days)}`;
      else if (j.deadline) dlText = j.deadline;
      else dlText = '상시';
      const dateLine = j.deadline
        ? `${j.deadline}${j.deadlineTime ? ' ' + j.deadlineTime : ''}`
        : '상시 채용';
      return `<div class="job-item">
        <div class="job-item-top">
          <span class="job-company-dot" style="background:${this.COMPANY_COLORS[j.companyId]||'#888'}"></span>
          <span class="job-company">${esc(j.company)}</span>
          <span class="job-deadline ${urgent?'urgent':''}">${esc(dlText)}</span>
        </div>
        <div class="job-title">${j.url ? `<a href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title)}</a>` : esc(j.title)}</div>
        <div class="job-meta">${esc(dateLine)}${j.department ? ' · ' + esc(j.department) : ''}${j.location ? ' · ' + esc(j.location) : ''}</div>
      </div>`;
    },

    renderList() {
      const urgentCard = document.getElementById('jobs-list-card');
      const standingCard = document.getElementById('standing-jobs-card');
      if (!urgentCard) return;
      const allJobs = this.state.snapshot?.jobs || [];
      const grouped = this.groupByDate();
      const empty = `<div style="font-size:12px;color:var(--text3);padding:8px 0;font-family:var(--mono);">해당 기간 공고 없음</div>`;

      // Group jobs by company (ASC), then deadline ASC within a company.
      // The previous deadline-only sort meant a deadline-heavy company (CJ) could
      // push another company (LG CNS) past the 30-row slice and out of view.
      const byCompanyAsc = (a, b) => {
        const c = (a.company || '').localeCompare(b.company || '');
        return c || this.parseDeadline(a.deadline) - this.parseDeadline(b.deadline);
      };

      // === Urgent / selected-date card ===
      let title, list;
      if (this.state.selectedDate) {
        const exact = grouped[this.state.selectedDate] || [];
        if (exact.length) {
          // The selected day is itself a deadline — show those jobs.
          title = `${this.state.selectedDate} 마감 (${exact.length}건)`;
          list = [...exact].sort(byCompanyAsc);
        } else {
          // No deadlines on this day — show every job still open as of that date,
          // so the user can see what they could apply to on that day.
          const sel = new Date(this.state.selectedDate); sel.setHours(0,0,0,0);
          list = allJobs
            .filter(j => {
              const d = this.parseDeadline(j.deadline);
              return d && d >= sel;
            })
            .sort(byCompanyAsc);
          title = `${this.state.selectedDate} 기준 신청 가능 (${list.length}건)`;
        }
      } else {
        const now = new Date(); now.setHours(0,0,0,0);
        const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() + 14);
        list = allJobs.filter(j => {
          const d = this.parseDeadline(j.deadline);
          return d && d >= now && d <= cutoff;
        }).sort(byCompanyAsc);
        title = `📍 마감 임박 (2주 내, ${list.length}건)`;
      }
      urgentCard.innerHTML = `<div class="jobs-list-title">${esc(title)}</div>` +
        (list.length ? list.map(j => this.jobItemHtml(j)).join('') : empty);

      // === Standing (상시 / undated) card ===
      if (standingCard) {
        // Sort by company so all postings from the same company appear together;
        // also helps users locate a specific company quickly.
        const standing = allJobs
          .filter(j => !this.parseDeadline(j.deadline))
          .sort((a, b) => (a.company || '').localeCompare(b.company || ''));
        standingCard.innerHTML = `<div class="jobs-list-title">♾️ 상시 채용 (${standing.length}건)</div>` +
          (standing.length ? standing.map(j => this.jobItemHtml(j)).join('') : empty);
      }
    },

    renderConfigPanel() {
      const root = document.getElementById('jobs-config-panel');
      if (!root) return;
      const cfg = this.state.config;
      if (!cfg) {
        root.innerHTML = `<div class="jcp-title">설정</div>
          <div style="font-size:11px;color:var(--text3);font-family:var(--mono);">data/jobs-config.json 로드 실패</div>`;
        return;
      }
      const includeTags = (cfg.filters?.include || []).map(t => `<span class="jcp-tag include">${esc(t)}</span>`).join('');
      const excludeTags = (cfg.filters?.exclude || []).map(t => `<span class="jcp-tag exclude">${esc(t)}</span>`).join('');
      const errs = new Set((this.state.snapshot?.errors || []).map(e => e.company));
      const companyChips = (cfg.companies || []).map(c => {
        const status = c.enabled === false ? '#444' : (errs.has(c.name) ? 'var(--danger)' : 'var(--accent)');
        return `<div class="jcp-company ${c.enabled === false ? 'disabled' : ''}">
          <span class="jcp-company-status" style="background:${status}"></span>
          <span>${esc(c.name)}</span>
          <span style="margin-left:auto;color:var(--text3);font-size:10px;">${esc(c.fetcher)}</span>
        </div>`;
      }).join('');

      root.innerHTML = `
        <div class="jcp-title">⚙️ 설정 (data/jobs-config.json 직접 편집)</div>
        <div class="jcp-grid">
          <div class="jcp-section">
            <h4>회사 (${(cfg.companies||[]).length})</h4>
            <div class="jcp-companies">${companyChips}</div>
          </div>
          <div class="jcp-section">
            <h4>포함 키워드 (${(cfg.filters?.include||[]).length})</h4>
            <div class="jcp-tags">${includeTags}</div>
            <h4 style="margin-top:14px;">제외 키워드 (${(cfg.filters?.exclude||[]).length})</h4>
            <div class="jcp-tags">${excludeTags}</div>
          </div>
        </div>
        <div class="jcp-hint">
          편집 후 <code>node scripts/fetch-jobs.mjs</code>로 즉시 갱신, 또는 GitHub Actions <code>Fetch IT job postings</code> 워크플로우를 수동 실행하세요.
          크론은 매월 1·4·7·10·13·16·19·22·25·28일 KST 00:00 자동 실행됩니다.
        </div>
      `;
    },
  };

  /* ========================================================
   * App — entry + wiring (full render in later tasks)
   * ======================================================== */
  const App = {
    async init() {
      Api.init();
      State.loadPref();
      Sidebar.init();
      Topbar.init();
      this.renderHome();
      await ImageArchive.load();
      // Load level map in parallel with tree (non-blocking).
      const levelP = Api.fetchLevelMap().then(m => { State.levelMap = m; });
      await this.reloadTree();
      await levelP;
      // Re-render once levels arrived so each item shows sub-tier (Silver III etc.)
      Sidebar.renderList();
      if (!State.currentProblem) this.renderHome();
    },

    async reloadTree({ force = false } = {}) {
      try {
        const { tree, source, error } = await Api.fetchTree({ force });
        State.problems = Parser.parseTree(tree);
        Sidebar.buildTabs();
        Sidebar.renderList();
        // Show source only when it's something the user might need to act on.
        // Normal fast paths (static / cache / etag-304 / fresh) are silent.
        const warnLabels = {
          'rate-limited-cache': '캐시(한도초과)',
          'offline-cache': '캐시(오프라인)',
          'error-cache': '캐시(오류)',
        };
        const warnLabel = warnLabels[source];
        const text = warnLabel
          ? `${State.problems.length.toLocaleString()}문제 · ${warnLabel}`
          : `${State.problems.length.toLocaleString()}문제`;
        Topbar.setChip(text, warnLabel ? 'warn' : '');
        if (error) console.warn('[App] tree fetch warning:', error);
      } catch (e) {
        Topbar.setChip(`오류: ${e.message}`, 'err');
      }
    },

    selectProblem(tier, num) {
      const p = State.problems.find(x => x.tier === tier && x.num === num);
      if (!p) return;
      State.currentProblem = p;
      State.currentTab = 'problem';
      Sidebar.renderList();
      ProblemView.renderShell(p);
    },

    goHome() {
      State.currentProblem = null;
      State.pref.tierFilter = 'ALL';
      State.pref.searchQuery = '';
      State.savePref();
      const sb = document.querySelector('.sidebar #search-inp');
      if (sb) sb.value = '';
      Sidebar.buildTabs();
      Sidebar.renderList();
      this.renderHome();
    },

    async showJobs() {
      State.currentProblem = null;
      Sidebar.renderList();
      await JobsView.render();
    },

    renderHome() {
      const main = document.querySelector('.main');
      if (!main) return;
      const totalProblems = State.problems.length;
      const favCount = State.favs.size;
      const solvedCount = State.problems.filter(p => p.hasSolution).length;
      const loaded = totalProblems > 0;

      main.innerHTML = `
        <div class="home-screen">
          <div class="home-logo">boj<span>.</span>study</div>
          <div class="home-tagline">백준 학습 뷰어 — 개인용 BOJ 미러 · 풀이 작성 · 즐겨찾기</div>
          <div class="home-stats">
            <div class="home-stat">
              <div class="home-stat-num">${loaded ? totalProblems.toLocaleString() : '...'}</div>
              <div class="home-stat-label">문제</div>
            </div>
            <div class="home-stat">
              <div class="home-stat-num gold">${favCount}</div>
              <div class="home-stat-label">즐겨찾기</div>
            </div>
            <div class="home-stat">
              <div class="home-stat-num green">${solvedCount}</div>
              <div class="home-stat-label">풀이 있음</div>
            </div>
          </div>
          <div class="home-actions">
            <button class="home-btn primary" id="home-fav-btn">★ 학습 코스 보기</button>
            <button class="home-btn solved" id="home-solved-btn">✓ 내 풀이</button>
            <button class="home-btn" id="home-all-btn">전체 둘러보기</button>
          </div>
          <div class="home-hint">왼쪽 사이드바에서 문제 클릭, 또는 <code>문제 번호 / 제목</code>으로 검색하세요.</div>
        </div>
      `;
      document.getElementById('home-fav-btn')?.addEventListener('click', () => {
        State.pref.tierFilter = '★';
        State.savePref();
        Sidebar.buildTabs();
        Sidebar.renderList();
      });
      document.getElementById('home-solved-btn')?.addEventListener('click', () => {
        State.pref.tierFilter = '✓';
        State.savePref();
        Sidebar.buildTabs();
        Sidebar.renderList();
      });
      document.getElementById('home-all-btn')?.addEventListener('click', () => {
        State.pref.tierFilter = 'ALL';
        State.savePref();
        Sidebar.buildTabs();
        Sidebar.renderList();
      });
    },
  };

  document.addEventListener('DOMContentLoaded', () => App.init());
})();
</script>
</body>
</html>
