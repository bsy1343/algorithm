<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>BOJ 학습 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  // MathJax v3 — render LaTeX (e.g., $1 \le N \le 10^9$) inside problem bodies.
  // Skip code/pre/textarea so sample I/O containing literal `$` is not parsed.
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true,
    },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] },
    startup: { typeset: false },
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --bg4: #21262d;
    --border: #30363d;
    --border2: #3d444d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --accent: #58a6ff;
    --accent-bg: rgba(88,166,255,0.1);
    --gold: #d29922;
    --gold-bg: rgba(210,153,34,0.12);
    --silver: #79c0ff;
    --silver-bg: rgba(121,192,255,0.1);
    --bronze: #f0883e;
    --bronze-bg: rgba(240,136,62,0.1);
    --green: #3fb950;
    --green-bg: rgba(63,185,80,0.1);
    --danger: #f85149;
    --radius: 8px;
    --radius-sm: 5px;
    --font: 'Pretendard', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }

  .app { display: grid; grid-template-columns: 360px 1fr; grid-template-rows: 52px 1fr; height: 100vh; transition: grid-template-columns 0.18s ease; }
  @media (max-width: 900px) { .app { grid-template-columns: 260px 1fr; } }
  .app.sidebar-hidden { grid-template-columns: 0 1fr; }
  .app.sidebar-hidden .sidebar { visibility: hidden; }

  /* Topbar */
  .topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .topbar-logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text2); white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.15s; }
  .topbar-logo span { color: var(--accent); }
  .topbar-logo:hover { color: var(--text); }
  .sidebar-toggle {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text3); cursor: pointer; padding: 3px 8px; font-size: 14px;
    line-height: 1; display: inline-flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s;
  }
  .sidebar-toggle:hover { color: var(--text); border-color: var(--border2); }
  .topbar-spacer { flex: 1; }
  .stat-chip { font-size: 11px; font-family: var(--mono); color: var(--text2); white-space: nowrap; }
  .stat-chip.warn { color: var(--gold); }
  .stat-chip.err { color: var(--danger); }
  .topbar-btn {
    font-size: 11px; font-family: var(--mono); color: var(--text3);
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 4px 10px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .topbar-btn:hover { color: var(--text); border-color: var(--border2); }

  /* Sidebar */
  .sidebar { border-right: 1px solid var(--border); background: var(--bg2); display: flex; flex-direction: column; overflow: hidden; }
  .tier-tabs {
    display: flex; flex-wrap: nowrap;
    border-bottom: 1px solid var(--border);
    padding: 0 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tier-tabs::-webkit-scrollbar { display: none; }
  .tier-tab {
    padding: 7px 6px; font-size: 10.5px; font-family: var(--mono);
    cursor: pointer; white-space: nowrap; color: var(--text3);
    border-bottom: 2px solid transparent; transition: color 0.15s;
    display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0;
  }
  .tier-tab:hover { color: var(--text2); }
  .tier-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tier-tab .icon { font-size: 15px; line-height: 1; }
  .tier-tab .icon.fav { color: var(--gold); }
  .tier-tab .icon.solved { color: var(--accent); }
  .tier-tab .icon.boost { color: #79c0ff; }

  .search-box { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .search-box input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: var(--font);
    font-size: 12px; padding: 5px 8px; outline: none;
  }
  .search-box input:focus { border-color: var(--border2); }
  .search-box input::placeholder { color: var(--text3); }

  .problem-list { flex: 1; overflow-y: auto; padding: 4px; }
  .problem-list::-webkit-scrollbar { width: 4px; }
  .problem-list::-webkit-scrollbar-track { background: transparent; }
  .problem-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .problem-item {
    padding: 9px 10px; border-radius: var(--radius-sm);
    cursor: pointer; margin-bottom: 1px;
    border: 1px solid transparent;
    transition: background 0.1s, border-color 0.1s;
  }
  .problem-item:hover { background: var(--bg3); }
  .problem-item.active { background: var(--bg3); border-color: var(--border2); }
  .problem-item.has-draft { position: relative; }
  .problem-item.has-draft::after {
    content: ''; position: absolute; top: 12px; right: 10px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .pi-top { display: flex; align-items: center; gap: 6px; }
  .pi-num { font-size: 10px; font-family: var(--mono); color: var(--text3); flex-shrink: 0; }
  .pi-tier-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pi-title { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .pi-meta { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--mono); padding-left: 12px; }
  .pi-fav {
    flex-shrink: 0; cursor: pointer; padding: 2px 4px; line-height: 1;
    color: var(--text3); font-size: 14px; user-select: none;
    transition: color 0.1s, transform 0.1s;
  }
  .pi-fav:hover { color: var(--text); transform: scale(1.2); }
  .pi-fav.on { color: var(--gold); }
  .empty-sidebar { padding: 24px 12px; text-align: center; font-size: 12px; color: var(--text3); line-height: 1.8; }

  /* Home screen */
  .home-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 32px; overflow-y: auto; text-align: center;
  }
  .home-logo {
    font-family: var(--mono); font-size: 56px; font-weight: 600;
    color: var(--text2); letter-spacing: -0.02em; margin-bottom: 10px;
  }
  .home-logo span { color: var(--accent); }
  .home-tagline { font-size: 14px; color: var(--text3); margin-bottom: 40px; font-family: var(--mono); }
  .home-stats { display: flex; gap: 48px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
  .home-stat { text-align: center; min-width: 96px; }
  .home-stat-num {
    font-family: var(--mono); font-size: 32px; font-weight: 600;
    color: var(--text); line-height: 1.2;
  }
  .home-stat-num.gold { color: var(--gold); }
  .home-stat-num.green { color: var(--accent); }
  .home-stat-label { font-size: 11px; color: var(--text3); margin-top: 6px; font-family: var(--mono); letter-spacing: 0.04em; text-transform: uppercase; }
  .home-actions { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
  .home-btn {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 20px; cursor: pointer; font-family: var(--mono); font-size: 13px;
    color: var(--text2); transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .home-btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
  .home-btn.primary { color: var(--gold); border-color: var(--gold); }
  .home-btn.primary:hover { background: var(--bg3); }
  .home-btn.solved { color: var(--accent); border-color: var(--accent); }
  .home-btn.solved:hover { background: var(--bg3); }
  .home-hint { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .home-hint code {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 3px;
    padding: 1px 5px; color: var(--text2);
  }

  /* Main */
  .main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
  .main-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); flex-wrap: wrap; min-height: 52px;
  }
  .main-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .tier-badge {
    font-size: 10px; font-family: var(--mono); font-weight: 500;
    padding: 2px 8px; border-radius: 20px; border: 1px solid;
  }
  .badge-gold { color: var(--gold); border-color: var(--gold); background: var(--gold-bg); }
  .badge-silver { color: var(--silver); border-color: var(--silver); background: var(--silver-bg); }
  .badge-bronze { color: var(--bronze); border-color: var(--bronze); background: var(--bronze-bg); }
  .badge-default { color: var(--text2); border-color: var(--border2); background: var(--bg3); }
  .badge-green { color: var(--green); border-color: var(--green); background: var(--green-bg); }

  /* Action bar */
  .action-bar { margin-left: auto; display: flex; gap: 6px; }
  .action-btn {
    padding: 5px 12px; font-size: 11px; font-family: var(--mono);
    background: var(--accent-bg); border: 1px solid var(--accent);
    color: var(--accent); border-radius: var(--radius-sm);
    cursor: pointer; white-space: nowrap; transition: background 0.15s, opacity 0.15s;
    text-decoration: none;
  }
  .action-btn:hover:not(:disabled):not(.disabled) { background: rgba(88,166,255,0.2); }
  .action-btn:disabled, .action-btn.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
  .action-btn.muted { background: var(--bg3); border-color: var(--border); color: var(--text2); }
  .action-btn.muted:hover { color: var(--text); border-color: var(--border2); background: var(--bg4); }

  .view-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg2); padding: 0 20px; gap: 0;
  }
  .view-tab {
    padding: 9px 16px; font-size: 12px; font-family: var(--mono);
    cursor: pointer; color: var(--text3);
    border-bottom: 2px solid transparent; transition: color 0.15s;
    background: none; border-left: 0; border-right: 0; border-top: 0;
  }
  .view-tab:hover { color: var(--text2); }
  .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main-content { flex: 1; overflow-y: auto; padding: 20px; }
  .main-content::-webkit-scrollbar { width: 4px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Meta cards (legacy — kept for non-problem-info contexts) */
  .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px,1fr)); gap: 8px; margin-bottom: 20px; }
  .meta-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .meta-label { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }
  .meta-val { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--mono); }

  /* BOJ-style problem-info table */
  .prob-info {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
    font-family: var(--mono);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .prob-info th, .prob-info td { padding: 14px 14px; text-align: left; vertical-align: middle; }
  .prob-info th {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.02em;
    border-bottom: 1px solid var(--border);
  }
  .prob-info td { font-size: 13px; font-weight: 500; color: var(--text); }
  @media (max-width: 720px) {
    .prob-info th, .prob-info td { padding: 10px 8px; font-size: 11px; }
    .prob-info td { font-size: 12px; }
  }

  /* Problem sections */
  .prob-section { margin-bottom: 20px; }
  .prob-section-title {
    font-size: 12px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 10px; font-family: var(--mono);
    display: flex; align-items: center; gap: 8px;
  }
  .prob-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .prob-body { font-size: 15px; color: #c9d1d9; line-height: 1.85; }
  .prob-body img { max-width: 100%; border-radius: var(--radius); margin: 14px auto; display: block; }
  .prob-body p { margin-bottom: 12px; color: #c9d1d9; font-size: 15px; line-height: 1.85; }
  .prob-body p[style*="text-align: center"] { text-align: center; }
  .prob-body ul, .prob-body ol { padding-left: 22px; color: #c9d1d9; font-size: 15px; line-height: 1.85; margin-bottom: 12px; }
  .prob-body li { margin-bottom: 6px; }
  .prob-body sub, .prob-body sup { font-size: 12px; }
  .prob-body strong, .prob-body b { color: var(--text); font-weight: 600; }
  .prob-body code { font-family: var(--mono); font-size: 13px; background: var(--bg3); padding: 1px 6px; border-radius: 3px; color: var(--accent); }
  .prob-body table { border-collapse: collapse; margin: 10px 0; }
  .prob-body td, .prob-body th { border: 1px solid var(--border); padding: 6px 10px; }
  .prob-body th { background: var(--bg3); color: var(--text); }

  /* IO grid */
  .io-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .io-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .io-label {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10px; font-family: var(--mono); color: var(--text3);
    margin-bottom: 8px; font-weight: 500;
  }
  .io-copy {
    font-size: 10px; font-family: var(--mono);
    color: var(--text3); background: none; border: 1px solid var(--border);
    border-radius: 3px; padding: 2px 8px;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .io-copy:hover { color: var(--text); border-color: var(--border2); }
  .io-box pre { font-size: 13px; color: var(--text); font-family: var(--mono); white-space: pre-wrap; line-height: 1.6; }

  /* Code */
  .code-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    background: var(--bg3); gap: 8px;
  }
  .code-lang { font-size: 11px; font-family: var(--mono); color: var(--text3); }
  .code-actions { display: flex; gap: 6px; align-items: center; }
  .code-status { font-size: 10px; font-family: var(--mono); color: var(--text3); }
  .copy-btn, .reset-btn, .seed-btn {
    font-size: 11px; font-family: var(--mono);
    color: var(--text3); background: none; border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 3px 10px;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .copy-btn:hover, .reset-btn:hover, .seed-btn:hover { color: var(--text); border-color: var(--border2); }
  .code-wrap pre {
    padding: 16px; font-size: 13px; color: var(--text);
    font-family: var(--mono); overflow-x: auto;
    white-space: pre; line-height: 1.7;
  }

  /* Jobs screen */
  .jobs-screen { flex: 1; padding: 28px 32px; overflow-y: auto; }
  .jobs-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .jobs-title { font-size: 22px; font-weight: 600; color: var(--text); }
  .jobs-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .jobs-meta .ok { color: var(--accent); }
  .jobs-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: stretch; }
  @media (max-width: 1100px) { .jobs-layout { grid-template-columns: 1fr; } }

  .calendar-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; height: fit-content; }
  .cal-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .cal-nav .month { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; font-family: var(--mono); }
  .cal-nav button {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
    border-radius: var(--radius-sm); padding: 4px 10px; font-size: 12px;
    cursor: pointer; font-family: var(--mono);
  }
  .cal-nav button:hover { color: var(--text); border-color: var(--border2); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { font-size: 10px; color: var(--text3); padding: 2px; text-align: center; font-family: var(--mono); letter-spacing: 0.04em; }
  .cal-cell {
    aspect-ratio: 1.5; padding: 4px 5px;
    background: var(--bg3); border: 1px solid transparent; border-radius: var(--radius-sm);
    cursor: default; position: relative; overflow: hidden;
  }
  .cal-cell.dim { opacity: 0.35; }
  .cal-cell:not(.dim) { cursor: pointer; }
  .cal-cell:not(.dim):hover { border-color: var(--border2); }
  .cal-cell.active { border-color: var(--accent); background: var(--bg); }
  .cal-cell.today { box-shadow: inset 0 0 0 1px var(--gold); }
  .cal-day { font-size: 10px; color: var(--text2); font-family: var(--mono); margin-bottom: 2px; line-height: 1.2; }
  .cal-cell.today .cal-day { color: var(--gold); font-weight: 600; }
  .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-count { font-size: 9px; color: var(--text3); font-family: var(--mono); }

  .jobs-side {
    display: flex; flex-direction: column; gap: 16px;
    max-height: calc(100vh - 220px); min-height: 0;
  }
  .jobs-list-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .jobs-list-card .jobs-list-title { flex-shrink: 0; }
  .jobs-list-card::-webkit-scrollbar { width: 4px; }
  .jobs-list-card::-webkit-scrollbar-track { background: transparent; }
  .jobs-list-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .jobs-list-title { font-size: 12px; color: var(--text2); font-family: var(--mono); margin-bottom: 12px; letter-spacing: 0.04em; }
  .job-item {
    padding: 10px; background: var(--bg3); border-radius: var(--radius-sm);
    margin-bottom: 6px; border: 1px solid transparent; transition: border-color 0.15s;
  }
  .job-item:hover { border-color: var(--border2); }
  .job-item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .job-company-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .job-company { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .job-deadline { font-size: 10px; color: var(--gold); font-family: var(--mono); margin-left: auto; }
  .job-deadline.urgent { color: var(--danger); }
  .job-title { font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .job-title a { color: var(--text); text-decoration: none; }
  .job-title a:hover { color: var(--accent); }
  .job-meta { font-size: 10px; color: var(--text3); font-family: var(--mono); }

  /* Bottom config panel */
  .jobs-config-panel {
    margin-top: 28px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
  }
  .jcp-title { font-size: 13px; color: var(--text2); margin-bottom: 12px; font-family: var(--mono); letter-spacing: 0.04em; }
  .jcp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 800px) { .jcp-grid { grid-template-columns: 1fr; } }
  .jcp-section h4 { font-size: 11px; color: var(--text3); margin: 0 0 8px 0; font-family: var(--mono); letter-spacing: 0.04em; text-transform: uppercase; }
  .jcp-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .jcp-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); font-family: var(--mono);
  }
  .jcp-tag.exclude { color: var(--text3); }
  .jcp-tag.exclude::before { content: '−'; color: var(--danger); margin-right: 4px; }
  .jcp-tag.include::before { content: '+'; color: var(--accent); margin-right: 4px; }
  .jcp-companies { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 6px; }
  .jcp-company {
    padding: 8px 10px; background: var(--bg3); border-radius: var(--radius-sm);
    font-size: 11px; font-family: var(--mono); display: flex; align-items: center; gap: 6px;
  }
  .jcp-company.disabled { opacity: 0.4; }
  .jcp-company-status { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .jcp-hint { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .jcp-hint code { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; color: var(--text2); }

  /* Editor */
  .editor {
    width: 100%; min-height: 320px; resize: vertical;
    padding: 16px; font-size: 13px; color: var(--text);
    font-family: var(--mono); background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius);
    outline: none; line-height: 1.7;
    tab-size: 4; -moz-tab-size: 4;
    white-space: pre; overflow-wrap: normal; overflow-x: auto;
  }
  .editor:focus { border-color: var(--border2); }
  .editor::placeholder { color: var(--text3); }

  /* Compare */
  .compare-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 1100px) { .compare-wrap { grid-template-columns: 1fr; } }

  /* Java syntax */
  .kw { color: #ff7b72; }
  .cm { color: #8b949e; font-style: italic; }
  .str { color: #a5d6ff; }
  .num { color: #79c0ff; }
  .ann { color: #e3b341; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 16px; border-radius: var(--radius);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-color: var(--danger); color: var(--danger); }

  .loading-msg { font-size: 12px; color: var(--text3); font-family: var(--mono); padding: 16px 0; }
  .err-msg { font-size: 12px; color: var(--danger); font-family: var(--mono); padding: 16px 0; }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebar-toggle" title="사이드바 토글" aria-label="사이드바 토글">≡</button>
    <div class="topbar-logo" id="topbar-logo" title="홈 + 새로고침">boj<span>.</span>study</div>
    <div class="topbar-spacer"></div>
    <span class="stat-chip" id="stat-chip"></span>
    <button class="topbar-btn" id="jobs-btn" title="IT 채용 공고 (3일마다 갱신)">채용</button>
  </header>
  <aside class="sidebar"><div class="loading">트리 로딩 대기...</div></aside>
  <main class="main"></main>
</div>
<script>
(() => {
  'use strict';

  /* ========================================================
   * Repo identity — auto-detected from GitHub Pages URL,
   * with fallback for local development.
   * ======================================================== */
  const REPO = (() => {
    const { hostname, pathname } = window.location;
    if (hostname.endsWith('.github.io')) {
      const segs = pathname.split('/').filter(Boolean);
      return { owner: hostname.split('.')[0], repo: segs[0] || 'algorithm', branch: 'main' };
    }
    return { owner: 'bsy1343', repo: 'algorithm', branch: 'main' };
  })();

  /* ========================================================
   * Api — GitHub tree fetch with ETag cache + same-origin
   * file fetch with proper Korean/space encoding.
   * ======================================================== */
  const Api = {
    TREE_KEY: 'tree-cache-v5',  // v4 dropped per-tier sizes; bump to refetch with .java size.
    TREE_TTL_MS: 60 * 60 * 1000,

    init() {
      // Clean up legacy cache keys.
      for (const k of ['tree-cache', 'tree-cache-v2', 'tree-cache-v3', 'tree-cache-v4']) {
        try { localStorage.removeItem(k); } catch {}
      }
    },

    // Slim the GitHub tree to just what Parser needs: blob paths under 백준/.
    // Cuts cache size ~10x (25MB → ~3MB for 21k problems).
    // Keep size for .java files — used to detect skeleton vs. real solution.
    slimTree(tree) {
      const out = [];
      for (const item of tree) {
        if (item.type !== 'blob') continue;
        if (!item.path.startsWith('백준/')) continue;
        const e = { type: 'blob', path: item.path };
        if (item.path.toLowerCase().endsWith('.java') && item.size != null) e.size = item.size;
        out.push(e);
      }
      return out;
    },

    safeSetCache(value) {
      try {
        localStorage.setItem(this.TREE_KEY, JSON.stringify(value));
      } catch (e) {
        // QuotaExceededError or similar — drop cache rather than break.
        try { localStorage.removeItem(this.TREE_KEY); } catch {}
        console.warn('[Api] tree cache write failed, falling back to no-cache:', e.message);
      }
    },

    // GitHub git/trees recursive=1 caps at ~100k entries. With 21k problems × 5 files
    // we exceed it and tiers get silently dropped. Workaround: fetch root tree (non-
    // recursive) → 백준 subtree (non-recursive, lists tiers) → each tier subtree
    // (recursive). Each tier ~25k–35k entries, comfortably under the cap.
    async fetchTreeByTier(rootTreeSha, etagHeaders) {
      const apiBase = `https://api.github.com/repos/${REPO.owner}/${REPO.repo}/git/trees`;
      // 1. Root tree (non-recursive): find 백준 SHA + capture root etag for cache key.
      const rootRes = await fetch(`${apiBase}/${rootTreeSha || REPO.branch}`, { headers: etagHeaders });
      if (rootRes.status === 304) return { tree: null, etag: null, source: 'etag-304' };
      if (rootRes.status === 403) throw Object.assign(new Error('rate-limited'), { code: 403 });
      if (!rootRes.ok) throw new Error(`GitHub API HTTP ${rootRes.status}`);
      const rootData = await rootRes.json();
      const rootEtag = rootRes.headers.get('etag');
      const baekjoonNode = rootData.tree.find(n => n.path === '백준' && n.type === 'tree');
      if (!baekjoonNode) return { tree: [], etag: rootEtag, source: 'fresh' };

      // 2. 백준 tree (non-recursive): list tier subtrees.
      const bjRes = await fetch(`${apiBase}/${baekjoonNode.sha}`);
      if (!bjRes.ok) throw new Error(`백준 tree HTTP ${bjRes.status}`);
      const bjData = await bjRes.json();
      const tierNodes = bjData.tree.filter(n => n.type === 'tree');

      // 3. Per-tier recursive fetch in parallel — each <100k entries.
      const tierTrees = await Promise.all(tierNodes.map(async tn => {
        const r = await fetch(`${apiBase}/${tn.sha}?recursive=1`);
        if (!r.ok) throw new Error(`tier ${tn.path} HTTP ${r.status}`);
        const d = await r.json();
        // Re-prefix paths with 백준/Tier/ since per-tier tree paths are relative to that subtree.
        // Keep size for .java files so Parser can compute hasSolution.
        return d.tree
          .filter(it => it.type === 'blob')
          .map(it => {
            const e = { type: 'blob', path: `백준/${tn.path}/${it.path}` };
            if (it.path.toLowerCase().endsWith('.java') && it.size != null) e.size = it.size;
            return e;
          });
      }));
      const combined = tierTrees.flat();
      return { tree: combined, etag: rootEtag, source: 'fresh' };
    },

    // Fast path: pre-built static tree committed by .github/workflows/build-tree-cache.yml.
    // No GitHub API hit (no rate limit), no recursion, just one CDN fetch
    // that the browser caches with HTTP ETag. Returns null if missing.
    async fetchStaticTree() {
      try {
        const r = await fetch('data/tree-cache.json', { cache: 'default' });
        if (!r.ok) return null;
        const data = await r.json();
        if (!Array.isArray(data?.tree) || !data.tree.length) return null;
        return data.tree;
      } catch { return null; }
    },

    async fetchTree({ force = false } = {}) {
      const cached = JSON.parse(localStorage.getItem(this.TREE_KEY) || 'null');
      const fresh = cached && (Date.now() - new Date(cached.fetchedAt).getTime() < this.TREE_TTL_MS);
      if (fresh && !force) return { tree: cached.tree, source: 'cache-fresh' };

      // Try static tree first — only one network request, browser handles
      // ETag/304 transparently so unchanged files cost ~0 bytes.
      const staticTree = await this.fetchStaticTree();
      if (staticTree) {
        this.safeSetCache({
          etag: null,
          fetchedAt: new Date().toISOString(),
          tree: staticTree,
        });
        return { tree: staticTree, source: 'static' };
      }

      // Fallback: legacy GitHub Tree API path (used when tree-cache.json
      // is missing — fresh repo before the workflow has run, or local dev).
      const headers = {};
      if (cached?.etag && !force) headers['If-None-Match'] = cached.etag;

      try {
        const result = await this.fetchTreeByTier(REPO.branch, headers);
        if (result.source === 'etag-304' && cached) {
          cached.fetchedAt = new Date().toISOString();
          this.safeSetCache(cached);
          return { tree: cached.tree, source: 'etag-304' };
        }
        const next = {
          etag: result.etag,
          fetchedAt: new Date().toISOString(),
          tree: result.tree,
        };
        this.safeSetCache(next);
        return { tree: result.tree, source: result.source };
      } catch (e) {
        if (e.code === 403 && cached) return { tree: cached.tree, source: 'rate-limited-cache' };
        if (cached) return { tree: cached.tree, source: 'error-cache', error: e.message };
        throw new Error(`GitHub API 오류: ${e.message}`);
      }
    },

    encodePath(path) {
      return path.split('/').map(encodeURIComponent).join('/');
    },

    // Fetch solved.ac tier meta (id → level). ~2.6MB; cached by browser.
    // Used to display sub-tier labels (e.g. "Silver III") on each problem.
    async fetchLevelMap() {
      try {
        const res = await fetch('scripts/all-tiers-meta.json');
        if (!res.ok) return {};
        const data = await res.json();
        const map = {};
        for (const id in data) map[id] = data[id].level;
        return map;
      } catch {
        return {};
      }
    },

    async fetchFile(path) {
      const res = await fetch(this.encodePath(path));
      if (!res.ok) throw new Error(`파일 로드 실패 (${res.status}): ${path}`);
      return res.text();
    },
  };

  /* ========================================================
   * Parser — tree to problem list, README to meta + sections.
   * ======================================================== */
  const Parser = {
    PATH_RE: /^백준\/([^/]+)\/(\d+)\.\s*([^/]+?)\/(.+)$/,
    // import-tier skeletons cap around 295 bytes (149 fixed + ≤150 title bytes).
    // 250 lets us count even minimal hand-written A+B-style solutions as real.
    SKELETON_MAX: 250,

    TIER_NAMES: ['Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond', 'Ruby', 'Master'],
    SUB_NUMERAL: ['V', 'IV', 'III', 'II', 'I'],

    // Convert solved.ac level (1-30) to display label like "Silver III".
    levelToLabel(level) {
      if (!level) return '';
      const tier = Math.floor((level - 1) / 5);
      const sub = (level - 1) % 5;  // 0=V, 4=I
      return `${this.TIER_NAMES[tier]} ${this.SUB_NUMERAL[sub]}`;
    },

    parseTree(tree) {
      const map = {};
      for (const item of tree) {
        if (item.type !== 'blob') continue;
        const m = item.path.match(this.PATH_RE);
        if (!m) continue;
        const [, tier, num, title, fname] = m;
        const key = `${tier}||${num}`;
        if (!map[key]) {
          map[key] = { tier, num, title: title.trim(), files: { inputs: [], outputs: [] }, hasSolution: false };
        }
        const fl = fname.toLowerCase();
        if (fl === 'readme.md') {
          map[key].files.readme = item.path;
        } else if (fl.endsWith('.java')) {
          const expected = `${map[key].title}.java`.toLowerCase();
          if (fl === expected) map[key].files.java = item.path;
          else if (!map[key].files.java) map[key].files.java = item.path;
          if (item.size != null && item.size > this.SKELETON_MAX) map[key].hasSolution = true;
        } else if (/^input\d*\.txt$/.test(fl)) {
          map[key].files.inputs.push(item.path);
        } else if (/^output\d*\.txt$/.test(fl)) {
          map[key].files.outputs.push(item.path);
        }
      }
      return Object.values(map).sort((a, b) => +a.num - +b.num);
    },

    tierColor(tier) {
      if (/^Gold/.test(tier)) return '#d29922';
      if (/^Platinum/.test(tier)) return '#3fb950';
      if (/^Silver/.test(tier)) return '#79c0ff';
      if (/^Bronze/.test(tier)) return '#f0883e';
      return '#484f58';
    },

    tierBadgeClass(tier) {
      if (/^Gold/.test(tier)) return 'badge-gold';
      if (/^Silver/.test(tier)) return 'badge-silver';
      if (/^Bronze/.test(tier)) return 'badge-bronze';
      if (/^Platinum/.test(tier)) return 'badge-green';
      return 'badge-default';
    },

    TIER_ORDER: ['Platinum', 'Gold', 'Silver', 'Bronze'],

    sortTiers(tiers) {
      return [...tiers].sort((a, b) => {
        const ia = this.TIER_ORDER.findIndex(t => a.startsWith(t));
        const ib = this.TIER_ORDER.findIndex(t => b.startsWith(t));
        return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
      });
    },

    parseReadmeMeta(md) {
      const meta = {};
      const lines = md.split('\n');
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i];
        // Memory: matches both "메모리: 17852 KB" (BaekjoonHub user stats)
        // and "메모리 제한: 128 MB" (our auto-import format)
        const mem = l.match(/메모리[^:]*:\s*([\d,]+\s*(?:KB|MB))/);
        if (mem) meta.memory = mem[1].trim();
        // Time: matches both "시간: 180 ms" and "시간 제한: 2 초"
        const tim = l.match(/시간[^:]*:\s*([\d,]+\s*(?:ms|초))/);
        if (tim) meta.time = tim[1].trim();
        // BOJ stats line — auto-import format:
        //   "제출: 574, 정답: 407, 맞힌 사람: 370, 정답 비율: 71.017%"
        // Regex `(\d+(?:,\d+)*)` matches "1,413,294" but stops before trailing
        // separator commas (e.g. "574, 정답:" → captures "574").
        const sub = l.match(/제출\s*:\s*(\d+(?:,\d+)*)/);
        if (sub && !meta.submit) meta.submit = sub[1];
        const acc = l.match(/정답\s*:\s*(\d+(?:,\d+)*)/);
        if (acc) meta.accept = acc[1];
        const per = l.match(/맞힌\s*사람\s*:\s*(\d+(?:,\d+)*)/);
        if (per) meta.person = per[1];
        const rat = l.match(/정답\s*비율\s*:\s*([\d.]+%)/);
        if (rat) meta.ratio = rat[1];
        if (/^#+\s*분류/.test(l)) {
          const next = lines.slice(i + 1).find(x => x.trim());
          if (next) meta.category = next.trim();
        }
        if (/^#+\s*제출\s*일자/.test(l)) {
          const next = lines.slice(i + 1).find(x => x.trim());
          if (next) meta.date = next.trim();
        }
      }
      return meta;
    },

    parseReadmeSections(md) {
      const sections = {};
      const keys = ['문제 설명', '문제', '입력', '출력', '힌트', '노트', '제한', '통계'];
      let cur = null;
      for (const l of md.split('\n')) {
        const hm = l.match(/^#+\s+(.+)/);
        if (hm) {
          const ht = hm[1].trim();
          cur = keys.find(k => ht.includes(k)) || null;
          if (cur && !sections[cur]) sections[cur] = '';
          continue;
        }
        if (cur) sections[cur] += l + '\n';
      }
      return sections;
    },

    containsHtmlTags(text) {
      return /<(p|div|ul|ol|li|img|sub|sup|strong|b|br|table|tr|td|th|h[1-6]|pre|code)\b/i.test(text);
    },

    sanitizeHtml(html) {
      // Strip script/style and inline event handlers EXCEPT onerror —
      // we use onerror= for the BOJ-archived image fallback.
      let clean = html
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<style[\s\S]*?<\/style>/gi, '')
        .replace(/on(?!error\b)\w+="[^"]*"/gi, '')
        .replace(/on(?!error\b)\w+='[^']*'/gi, '');
      // Promote BOJ-relative /upload/ to absolute URL (legacy fallback).
      clean = clean.replace(/src="\/upload\//g, 'src="https://www.acmicpc.net/upload/');
      clean = clean.replace(/src='\/upload\//g, "src='https://www.acmicpc.net/upload/");
      // Per-problem image localization (new layout): images live in the
      // problem's own folder; README's img src is already a relative URL.
      // The legacy ImageArchive map is now empty/unused — rewrite is a no-op.
      clean = ImageArchive.rewrite(clean);
      return clean;
    },

    mdToHtml(md) {
      return md.split('\n').map(l => {
        if (/^[-*]\s/.test(l)) return `<li>${l.replace(/^[-*]\s*/, '')}</li>`;
        if (l.trim() === '') return '<br>';
        let t = l
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.+?)`/g, '<code>$1</code>');
        return `<p>${t}</p>`;
      }).join('');
    },
  };

  /* ========================================================
   * Util — html escape (used by sidebar/views)
   * ======================================================== */
  const esc = (s) => (s ?? '')
    .toString()
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

  /* ========================================================
   * State — selected problem, current tab, drafts (localStorage)
   * ======================================================== */
  const State = {
    PREF_KEY: 'preferences',
    DRAFT_KEY: 'drafts',
    FAV_KEY: 'favorites',
    FAV_SEED_KEY: 'favorites-seeded-v1',
    BOOST_KEY: 'boost-list',
    BOOST_SEED_KEY: 'boost-seeded-v2',

    // Curated study course (백트래킹 → 정렬/그리디 → 투포인터 → 이분탐색 → DFS/BFS
    // → 트리/위상정렬 → 다익스트라 → DP). Seeded once on first run; if the user
    // removes any of these, they stay removed (we never re-add).
    DEFAULT_FAVS: [
      'Silver/15649', 'Silver/15650', 'Silver/15651', 'Silver/15652',
      'Silver/14888', 'Gold/9663', 'Silver/10825', 'Silver/1015',
      'Silver/11652', 'Silver/15970', 'Silver/7795', 'Gold/2470',
      'Silver/2805', 'Gold/2110', 'Gold/1806', 'Gold/13144',
      'Gold/1253', 'Gold/16472', 'Silver/1260', 'Silver/2667',
      'Gold/2251', 'Gold/14502', 'Silver/2178', 'Silver/1697',
      'Gold/3055', 'Silver/1012', 'Silver/11725', 'Gold/1068',
      'Gold/2252', 'Gold/1005', 'Gold/1916', 'Gold/1753',
      'Silver/9095', 'Silver/11726', 'Silver/2579',
    ],

    // Reinforcement set — minimal addons covering categories the favorites list
    // misses (LIS, knapsack, prefix-sum, Floyd, Union-Find, multi-source BFS,
    // simulation, bitmask, string DP, two-heap). Mastering these +
    // DEFAULT_FAVS covers ~99% of Korean tech company coding tests.
    DEFAULT_BOOST: [
      'Silver/11053',  // 가장 긴 증가하는 부분 수열 (LIS)
      'Gold/12865',    // 평범한 배낭 (0/1 Knapsack)
      'Silver/11659',  // 구간 합 구하기 4 (누적합)
      'Gold/11404',    // 플로이드 (모든 쌍 최단경로)
      'Gold/1717',     // 집합의 표현 (Union-Find)
      'Gold/7569',     // 토마토 (멀티소스 BFS)
      'Gold/14503',    // 로봇 청소기 (시뮬레이션 카카오풍)
      'Silver/11723',  // 집합 (비트마스킹 입문)
      'Gold/9251',     // LCS (문자열 DP)
      'Gold/1655',     // 가운데를 말해요 (두 힙)
    ],

    problems: [],
    currentProblem: null,
    currentTab: 'problem',
    favs: new Set(),
    boost: new Set(),
    levelMap: {},  // id (string) → level (1-30) from solved.ac meta

    pref: { tierFilter: 'ALL', searchQuery: '', currentTab: 'problem', compareMode: false, sidebarHidden: false },

    loadPref() {
      const raw = localStorage.getItem(this.PREF_KEY);
      if (raw) Object.assign(this.pref, JSON.parse(raw));
      this.currentTab = this.pref.currentTab || 'problem';
      try {
        this.favs = new Set(JSON.parse(localStorage.getItem(this.FAV_KEY) || '[]'));
      } catch { this.favs = new Set(); }
      try {
        this.boost = new Set(JSON.parse(localStorage.getItem(this.BOOST_KEY) || '[]'));
      } catch { this.boost = new Set(); }
      // Seed default favorites/boost once. Skipped on later loads — user removals stick.
      if (!localStorage.getItem(this.FAV_SEED_KEY)) {
        for (const k of this.DEFAULT_FAVS) this.favs.add(k);
        localStorage.setItem(this.FAV_KEY, JSON.stringify([...this.favs]));
        localStorage.setItem(this.FAV_SEED_KEY, '1');
      }
      if (!localStorage.getItem(this.BOOST_SEED_KEY)) {
        for (const k of this.DEFAULT_BOOST) this.boost.add(k);
        localStorage.setItem(this.BOOST_KEY, JSON.stringify([...this.boost]));
        localStorage.setItem(this.BOOST_SEED_KEY, '1');
      }
    },

    favKey(problem) { return `${problem.tier}/${problem.num}`; },
    isFav(problem) { return this.favs.has(this.favKey(problem)); },
    toggleFav(problem) {
      const k = this.favKey(problem);
      if (this.favs.has(k)) this.favs.delete(k);
      else this.favs.add(k);
      localStorage.setItem(this.FAV_KEY, JSON.stringify([...this.favs]));
    },
    isBoost(problem) { return this.boost.has(this.favKey(problem)); },
    toggleBoost(problem) {
      const k = this.favKey(problem);
      if (this.boost.has(k)) this.boost.delete(k);
      else this.boost.add(k);
      localStorage.setItem(this.BOOST_KEY, JSON.stringify([...this.boost]));
    },

    savePref() {
      localStorage.setItem(this.PREF_KEY, JSON.stringify(this.pref));
    },

    draftKey(problem) { return `${problem.tier}/${problem.num}`; },

    getDraft(problem) {
      const all = JSON.parse(localStorage.getItem(this.DRAFT_KEY) || '{}');
      return all[this.draftKey(problem)] || null;
    },

    setDraft(problem, code) {
      const all = JSON.parse(localStorage.getItem(this.DRAFT_KEY) || '{}');
      all[this.draftKey(problem)] = { code, updatedAt: new Date().toISOString() };
      localStorage.setItem(this.DRAFT_KEY, JSON.stringify(all));
    },

    deleteDraft(problem) {
      const all = JSON.parse(localStorage.getItem(this.DRAFT_KEY) || '{}');
      delete all[this.draftKey(problem)];
      localStorage.setItem(this.DRAFT_KEY, JSON.stringify(all));
    },

    hasDraft(problem) { return !!this.getDraft(problem); },
  };

  /* ========================================================
   * Sidebar — tier tabs + search box + problem list.
   * Note: every value injected into innerHTML goes through esc().
   * ======================================================== */
  const Sidebar = {
    init() {
      const sb = document.querySelector('.sidebar');
      sb.innerHTML = `
        <div class="tier-tabs" id="tier-tabs"></div>
        <div class="search-box">
          <input id="search-inp" placeholder="문제 번호 / 제목 검색..." />
        </div>
        <div class="problem-list" id="problem-list">
          <div class="empty-sidebar">로딩 중...</div>
        </div>
      `;
      sb.querySelector('#search-inp').value = State.pref.searchQuery;
      // Debounced — avoids re-rendering the full list on every keystroke.
      let searchTimer = null;
      sb.querySelector('#search-inp').addEventListener('input', (e) => {
        const v = e.target.value.trim();
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(() => {
          State.pref.searchQuery = v;
          State.savePref();
          this.renderList();
        }, 180);
      });
      // Single delegated click handler — set up once, survives renderList()
      // re-painting innerHTML. Avoids attaching N listeners per render.
      sb.querySelector('#problem-list').addEventListener('click', (e) => {
        const fav = e.target.closest?.('.pi-fav');
        if (fav) {
          e.stopPropagation();
          const p = State.problems.find(x => x.tier === fav.dataset.favTier && x.num === fav.dataset.favNum);
          if (!p) return;
          State.toggleFav(p);
          const on = State.isFav(p);
          fav.classList.toggle('on', on);
          fav.textContent = on ? '★' : '☆';
          const favTab = document.querySelector('.tier-tab[data-tier="★"]');
          if (favTab) {
            const c = State.favs.size;
            favTab.innerHTML = `<span class="icon fav">★</span>${c ? esc(String(c)) : ''}`;
          }
          if (State.pref.tierFilter === '★' && !on) {
            // List length changes — recompute spacer + visible window.
            this.renderList();
          }
          return;
        }
        const item = e.target.closest?.('.problem-item');
        if (item) App.selectProblem(item.dataset.tier, item.dataset.num);
      });
    },

    buildTabs() {
      const tiers = [...new Set(State.problems.map(p => p.tier))];
      const sorted = Parser.sortTiers(tiers);
      const favCount = State.favs.size;
      const boostCount = State.boost.size;
      const solvedCount = State.problems.filter(p => p.hasSolution).length;
      const all = [
        { key: 'ALL', html: 'ALL' },
        { key: '★', html: `<span class="icon fav">★</span>${favCount ? esc(String(favCount)) : ''}` },
        { key: '+', html: `<span class="icon boost">+</span>${boostCount ? esc(String(boostCount)) : ''}` },
        { key: '✓', html: `<span class="icon solved">✓</span>${solvedCount ? esc(String(solvedCount)) : ''}` },
        ...sorted.map(t => ({ key: t, html: esc(t) })),
      ];
      const html = all.map(t =>
        `<div class="tier-tab${t.key === State.pref.tierFilter ? ' active' : ''}" data-tier="${esc(t.key)}">${t.html}</div>`
      ).join('');
      const el = document.getElementById('tier-tabs');
      el.innerHTML = html;
      el.querySelectorAll('.tier-tab').forEach(node => {
        node.addEventListener('click', () => {
          State.pref.tierFilter = node.dataset.tier;
          State.savePref();
          this.buildTabs();
          this.renderList();
        });
      });
    },

    // Virtual scroll constants. Item is 58.8px tall + 1px gap → 60px slot.
    ITEM_H: 60,
    BUF_ROWS: 6,

    renderList() {
      const q = State.pref.searchQuery.toLowerCase();
      let list;
      if (State.pref.tierFilter === 'ALL') list = State.problems;
      else if (State.pref.tierFilter === '★') list = State.problems.filter(p => State.isFav(p));
      else if (State.pref.tierFilter === '+') list = State.problems.filter(p => State.isBoost(p));
      else if (State.pref.tierFilter === '✓') list = State.problems.filter(p => p.hasSolution);
      else list = State.problems.filter(p => p.tier === State.pref.tierFilter);
      if (q) list = list.filter(p => p.num.includes(q) || p.title.toLowerCase().includes(q));

      const el = document.getElementById('problem-list');
      this._list = list;
      if (!list.length) {
        el.innerHTML = '<div class="empty-sidebar">결과 없음</div>';
        return;
      }
      // Replace contents with a fixed-height spacer; only the visible
      // window of items is materialized inside it.
      el.innerHTML = `<div id="vs-pad" style="position:relative;height:${list.length * this.ITEM_H}px;"></div>`;
      // Attach the rAF-throttled scroll handler exactly once per list element.
      if (!el._vsBound) {
        el._vsBound = true;
        el.addEventListener('scroll', () => {
          if (this._vsRaf) return;
          this._vsRaf = requestAnimationFrame(() => {
            this._vsRaf = null;
            this._vsPaint();
          });
        }, { passive: true });
      }
      // Reset scroll: jump to currentProblem if it's in the new list, else top.
      let scrollTop = 0;
      if (State.currentProblem) {
        const idx = list.findIndex(p => p.tier === State.currentProblem.tier && p.num === State.currentProblem.num);
        if (idx >= 0) scrollTop = Math.max(0, idx * this.ITEM_H - el.clientHeight / 2);
      }
      el.scrollTop = scrollTop;
      this._vsLastStart = -1;
      this._vsLastEnd = -1;
      this._vsPaint();
    },

    _vsPaint() {
      const list = this._list;
      if (!list || !list.length) return;
      const el = document.getElementById('problem-list');
      const pad = document.getElementById('vs-pad');
      if (!el || !pad) return;
      const H = this.ITEM_H, B = this.BUF_ROWS;
      const scrollTop = el.scrollTop;
      const viewH = el.clientHeight;
      const startI = Math.max(0, Math.floor(scrollTop / H) - B);
      const endI = Math.min(list.length, Math.ceil((scrollTop + viewH) / H) + B);
      if (startI === this._vsLastStart && endI === this._vsLastEnd) return;
      this._vsLastStart = startI;
      this._vsLastEnd = endI;

      const cur = State.currentProblem;
      const draftsRaw = localStorage.getItem(State.DRAFT_KEY);
      const drafts = new Set(draftsRaw ? Object.keys(JSON.parse(draftsRaw)) : []);
      const favs = State.favs;
      const levelMap = State.levelMap;
      const parts = [];
      for (let i = startI; i < endI; i++) {
        const p = list[i];
        const dot = Parser.tierColor(p.tier);
        const isActive = cur && cur.num === p.num && cur.tier === p.tier;
        const ioCount = p.files.inputs.length;
        const k = p.tier + '/' + p.num;
        const draftMark = drafts.has(k) ? ' has-draft' : '';
        const isFav = favs.has(k);
        const lvl = levelMap[p.num];
        const tierLabel = lvl ? Parser.levelToLabel(lvl) : p.tier;
        const top = i * H;
        parts.push(`<div class="problem-item${isActive ? ' active' : ''}${draftMark}" style="position:absolute;top:${top}px;left:0;right:0;margin:0;" data-tier="${esc(p.tier)}" data-num="${esc(p.num)}"><div class="pi-top"><div class="pi-tier-dot" style="background:${dot}"></div><div class="pi-num">#${esc(p.num)}</div><div class="pi-title">${esc(p.title)}</div><div class="pi-fav${isFav ? ' on' : ''}" data-fav-tier="${esc(p.tier)}" data-fav-num="${esc(p.num)}" title="즐겨찾기">${isFav ? '★' : '☆'}</div></div><div class="pi-meta">${esc(tierLabel)}${ioCount ? ' · 예제 ' + ioCount + '개' : ''}</div></div>`);
      }
      pad.innerHTML = parts.join('');
    },
  };

  /* ========================================================
   * ProblemView — header (title + tier badge + action bar slot),
   * view tabs, meta cards + README body.
   * ======================================================== */
  const ProblemView = {
    renderShell(p) {
      const main = document.querySelector('.main');
      const lvl = State.levelMap[p.num];
      const tierLabel = lvl ? Parser.levelToLabel(lvl) : p.tier;
      main.innerHTML = `
        <div class="main-header" id="main-header">
          <div class="main-title">${esc(p.num + '. ' + p.title)}</div>
          <span class="tier-badge ${Parser.tierBadgeClass(p.tier)}">${esc(tierLabel)}</span>
          <div class="action-bar" id="action-bar"></div>
        </div>
        <div class="view-tabs" id="view-tabs">
          <button class="view-tab" data-tab="problem">문제</button>
          <button class="view-tab" data-tab="solution">풀이</button>
        </div>
        <div class="main-content" id="main-content"></div>
      `;
      main.querySelectorAll('.view-tab').forEach(node => {
        node.addEventListener('click', () => {
          State.currentTab = node.dataset.tab;
          State.pref.currentTab = node.dataset.tab;
          State.savePref();
          this.activateTab(node.dataset.tab);
        });
      });
      // Migrate legacy tabs (reference/mine) → solution
      const validTabs = ['problem', 'solution'];
      const initialTab = validTabs.includes(State.currentTab) ? State.currentTab : 'problem';
      this.activateTab(initialTab);
      ActionBar.render(p);
    },

    activateTab(tab) {
      State.currentTab = tab;
      document.querySelectorAll('.view-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      this.renderActiveTab();
    },

    setContent(html) {
      document.getElementById('main-content').innerHTML = html;
    },

    async renderActiveTab() {
      const p = State.currentProblem;
      if (!p) return;
      if (State.currentTab === 'problem') return this.renderProblem(p);
      if (State.currentTab === 'solution') return CodeView.render(p);
      this.setContent(`<div class="loading-msg">알 수 없는 탭: ${esc(State.currentTab)}</div>`);
    },

    async renderProblem(p) {
      this.setContent('<div class="loading-msg">README 로딩 중...</div>');
      try {
        if (!p._readme && p.files.readme) {
          p._readme = await Api.fetchFile(p.files.readme);
        }
        if (!p._readme) {
          this.setContent('<div class="loading-msg">README 없음</div>');
          return;
        }
        const meta = Parser.parseReadmeMeta(p._readme);
        const sections = Parser.parseReadmeSections(p._readme);

        let html = '';

        // BOJ-style problem-info table: 시간 제한 / 메모리 제한 / 제출 / 정답 / 맞힌 사람 / 정답 비율
        const infoCols = [
          ['시간 제한', meta.time],
          ['메모리 제한', meta.memory],
          ['제출', meta.submit],
          ['정답', meta.accept],
          ['맞힌 사람', meta.person],
          ['정답 비율', meta.ratio],
        ].filter(([, v]) => v);
        if (infoCols.length) {
          html += '<table class="prob-info"><thead><tr>'
            + infoCols.map(([k]) => `<th>${esc(k)}</th>`).join('')
            + '</tr></thead><tbody><tr>'
            + infoCols.map(([, v]) => `<td>${esc(v)}</td>`).join('')
            + '</tr></tbody></table>';
        }

        // Show 분류 immediately after the table (BOJ-style study layout).
        if (meta.category) {
          html += `<div class="prob-section">
            <div class="prob-section-title">알고리즘 분류</div>
            <div class="prob-body">${esc(meta.category)}</div>
          </div>`;
        }
        if (meta.date) {
          html += `<div class="prob-section">
            <div class="prob-section-title">제출일</div>
            <div class="prob-body">${esc(meta.date)}</div>
          </div>`;
        }

        // Section order: 문제 설명 → 입력 → 출력 → 제한 → 힌트 → 노트
        // (분류 already rendered above; 통계 already shown in prob-info table)
        const display = [
          ['문제 설명', '문제'],
          ['입력'],
          ['출력'],
          ['제한'],
          ['힌트'],
          ['노트'],
        ];
        for (const keys of display) {
          const key = keys.find(k => sections[k]?.trim());
          if (!key) continue;
          const body = sections[key].trim();
          const label = key === '문제 설명' ? '문제' : key;
          const rendered = Parser.containsHtmlTags(body)
            ? Parser.sanitizeHtml(body)
            : Parser.mdToHtml(body);
          html += `<div class="prob-section">
            <div class="prob-section-title">${esc(label)}</div>
            <div class="prob-body">${rendered}</div>
          </div>`;
        }

        if (!html) {
          const body = p._readme.split('\n').filter(l => !l.startsWith('#') && !l.match(/^\*\*(메모리|시간|분류|제출)/)).join('\n').trim();
          const rendered = Parser.containsHtmlTags(body) ? Parser.sanitizeHtml(body) : Parser.mdToHtml(body);
          html = `<div class="prob-body">${rendered}</div>`;
        }

        // Example I/O at the bottom (BOJ-style placement, integrated with problem view)
        html += await this.renderExampleIO(p);

        this.setContent(html);
        this.attachIOCopyHandlers();
        // Render LaTeX via MathJax once it has loaded.
        const el = document.getElementById('main-content');
        const typeset = () => window.MathJax?.typesetPromise?.([el]).catch(() => {});
        if (window.MathJax?.typesetPromise) typeset();
        else if (window.MathJax?.startup?.promise) window.MathJax.startup.promise.then(typeset);
      } catch (e) {
        this.setContent(`<div class="err-msg">${esc(e.message)}</div>`);
      }
    },

    async renderExampleIO(p) {
      const inputs = [...p.files.inputs].sort();
      const outputs = [...p.files.outputs].sort();
      if (!inputs.length && !outputs.length) return '';
      try {
        if (!p._inputs) p._inputs = await Promise.all(inputs.map(x => Api.fetchFile(x)));
        if (!p._outputs) p._outputs = await Promise.all(outputs.map(x => Api.fetchFile(x)));
        const max = Math.max(p._inputs.length, p._outputs.length);
        let out = `<div class="prob-section">
          <div class="prob-section-title">예제 입출력</div>
          <div>`;
        for (let i = 0; i < max; i++) {
          const inp = p._inputs[i] ?? '(없음)';
          const opt = p._outputs[i] ?? '(없음)';
          out += `<div class="io-pair">
            <div class="io-box">
              <div class="io-label"><span>예제 입력 ${i + 1}</span><button class="io-copy" type="button">복사</button></div>
              <pre>${esc(inp.trim())}</pre>
            </div>
            <div class="io-box">
              <div class="io-label"><span>예제 출력 ${i + 1}</span><button class="io-copy" type="button">복사</button></div>
              <pre>${esc(opt.trim())}</pre>
            </div>
          </div>`;
        }
        if (p._inputs.length !== p._outputs.length) {
          out += `<div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px">입력 ${p._inputs.length}개 · 출력 ${p._outputs.length}개 — 짝이 맞지 않는 항목은 "(없음)"으로 표기됩니다.</div>`;
        }
        out += '</div></div>';
        return out;
      } catch (e) {
        return `<div class="prob-section"><div class="prob-section-title">예제 입출력</div><div class="err-msg">${esc(e.message)}</div></div>`;
      }
    },

    attachIOCopyHandlers() {
      document.querySelectorAll('.io-copy').forEach(btn => {
        btn.addEventListener('click', () => {
          const pre = btn.closest('.io-box')?.querySelector('pre');
          if (!pre) return;
          navigator.clipboard.writeText(pre.textContent).then(
            () => Toast.show('복사 완료'),
            () => Toast.show('복사 실패. 직접 선택해 주세요.', { error: true })
          );
        });
      });
    },
  };

  /* ========================================================
   * Highlighter — minimal Java syntax highlighter.
   * ======================================================== */
  const Highlighter = {
    KEYWORDS: ['public','private','protected','class','interface','extends','implements',
      'new','return','if','else','for','while','do','switch','case','break','continue','default',
      'import','package','static','final','void','int','long','double','float','boolean','char',
      'byte','short','String','null','true','false','this','super','try','catch','finally','throw',
      'throws','instanceof','abstract','synchronized','volatile','transient','native','enum',
      'var','ArrayList','LinkedList','HashMap','HashSet','Scanner','Arrays','Math','System','out'],

    java(code) {
      // (?!=") prevents matching the keyword "class" inside attribute names
      // already injected by previous replace passes (e.g., <span class="num">).
      const kwRe = new RegExp(`\\b(${this.KEYWORDS.join('|')})\\b(?!=")`, 'g');
      return esc(code)
        .replace(/\/\/[^\n]*/g, m => `<span class="cm">${m}</span>`)
        .replace(/\/\*[\s\S]*?\*\//g, m => `<span class="cm">${m}</span>`)
        .replace(/(&quot;(?:[^&]|&(?!quot;))*&quot;)/g, m => `<span class="str">${m}</span>`)
        .replace(/(@\w+)/g, m => `<span class="ann">${m}</span>`)
        .replace(/\b(\d+[lLdDfF]?)\b/g, m => `<span class="num">${m}</span>`)
        .replace(kwRe, m => `<span class="kw">${m}</span>`);
    },
  };

  /* ========================================================
   * CodeView — unified "풀이" tab.
   *   View mode: shows current solution (draft if exists, else
   *              the original .java from repo). Read-only with
   *              syntax highlight. [복사] [수정] (and [원본으로]
   *              if a draft is overriding the original).
   *   Edit mode: textarea editor with debounced autosave to
   *              localStorage drafts. [편집 종료] returns to view.
   * ======================================================== */
  const CodeView = {
    _editing: false,

    async render(p) {
      // Reset edit mode whenever a different problem is selected.
      if (this._editingProblemKey !== State.draftKey(p)) {
        this._editing = false;
        this._editingProblemKey = State.draftKey(p);
      }
      if (this._editing) return this.renderEditor(p);
      return this.renderViewer(p);
    },

    async renderViewer(p) {
      ProblemView.setContent('<div class="loading-msg">코드 로딩 중...</div>');
      const draft = State.getDraft(p);
      let code, sourceLabel, hasDraft;

      try {
        if (draft && draft.code.trim()) {
          code = draft.code;
          sourceLabel = '풀이 · 수정됨';
          hasDraft = true;
        } else {
          if (!p.files.java) {
            ProblemView.setContent('<div class="loading-msg">.java 파일이 없고 작성된 풀이도 없습니다. [수정] 버튼으로 새로 작성하세요.</div>');
            // Still render header so the 수정 button exists
            ProblemView.setContent(this.viewerMarkup({ code: '', sourceLabel: '풀이 · 비어있음', hasDraft: false }));
            this.attachViewerHandlers(p, '');
            return;
          }
          if (!p._java) p._java = await Api.fetchFile(p.files.java);
          code = p._java;
          sourceLabel = '풀이 · 원본';
          hasDraft = false;
        }
        ProblemView.setContent(this.viewerMarkup({ code, sourceLabel, hasDraft }));
        this.attachViewerHandlers(p, code, hasDraft);
      } catch (e) {
        ProblemView.setContent(`<div class="err-msg">${esc(e.message)}</div>`);
      }
    },

    viewerMarkup({ code, sourceLabel, hasDraft }) {
      const compareBtn = hasDraft
        ? `<button class="seed-btn" id="solution-compare" title="원본과 내 수정본을 나란히 비교">원본과 비교</button>`
        : '';
      const revertBtn = hasDraft
        ? `<button class="reset-btn" id="solution-revert" title="수정사항 삭제 후 원본으로">원본으로</button>`
        : '';
      return `<div class="code-wrap">
        <div class="code-header">
          <span class="code-lang">Java · ${esc(sourceLabel)}</span>
          <div class="code-actions">
            <button class="copy-btn" id="solution-copy">복사</button>
            ${compareBtn}
            ${revertBtn}
            <button class="seed-btn" id="solution-edit">수정</button>
          </div>
        </div>
        <pre>${Highlighter.java(code)}</pre>
      </div>`;
    },

    attachViewerHandlers(p, code, hasDraft) {
      document.getElementById('solution-copy')?.addEventListener('click', () => {
        if (!code) { Toast.show('복사할 내용이 없습니다', { error: true }); return; }
        navigator.clipboard.writeText(code).then(
          () => Toast.show('복사 완료'),
          () => Toast.show('복사 실패. 직접 선택해 주세요.', { error: true })
        );
      });
      document.getElementById('solution-edit')?.addEventListener('click', () => {
        this._editing = true;
        this.renderEditor(p);
      });
      if (hasDraft) {
        document.getElementById('solution-compare')?.addEventListener('click', () => {
          this.renderCompare(p);
        });
        document.getElementById('solution-revert')?.addEventListener('click', () => {
          if (!confirm('수정한 내용을 삭제하고 원본 풀이로 되돌립니다. 계속할까요?')) return;
          State.deleteDraft(p);
          Sidebar.renderList();
          Toast.show('원본으로 되돌렸습니다');
          this.renderViewer(p);
        });
      }
    },

    async renderCompare(p) {
      ProblemView.setContent('<div class="loading-msg">비교 화면 로딩 중...</div>');
      const draft = State.getDraft(p);
      if (!draft || !draft.code.trim()) {
        Toast.show('수정한 풀이가 없어 비교할 수 없습니다', { error: true });
        return this.renderViewer(p);
      }
      if (!p.files.java) {
        Toast.show('원본 .java 파일이 없습니다', { error: true });
        return this.renderViewer(p);
      }
      try {
        if (!p._java) p._java = await Api.fetchFile(p.files.java);
        const left = `<div class="code-wrap">
          <div class="code-header">
            <span class="code-lang">Java · 원본</span>
            <div class="code-actions">
              <button class="copy-btn" id="cmp-copy-left">복사</button>
            </div>
          </div>
          <pre>${Highlighter.java(p._java)}</pre>
        </div>`;
        const updatedAt = new Date(draft.updatedAt).toLocaleString('ko-KR');
        const right = `<div class="code-wrap">
          <div class="code-header">
            <span class="code-lang">Java · 수정됨</span>
            <div class="code-actions">
              <span class="code-status">${esc(updatedAt)}</span>
              <button class="copy-btn" id="cmp-copy-right">복사</button>
            </div>
          </div>
          <pre>${Highlighter.java(draft.code)}</pre>
        </div>`;
        ProblemView.setContent(`
          <div style="margin-bottom:12px;display:flex;align-items:center;gap:10px">
            <span style="font-size:11px;font-family:var(--mono);color:var(--text2)">원본 vs 수정본 — 좁은 화면에서는 위/아래로 쌓입니다</span>
            <button class="reset-btn" id="cmp-close" style="margin-left:auto">비교 닫기</button>
          </div>
          <div class="compare-wrap">${left}${right}</div>
        `);
        document.getElementById('cmp-copy-left').addEventListener('click', () => {
          navigator.clipboard.writeText(p._java).then(
            () => Toast.show('원본 복사 완료'),
            () => Toast.show('복사 실패', { error: true })
          );
        });
        document.getElementById('cmp-copy-right').addEventListener('click', () => {
          navigator.clipboard.writeText(draft.code).then(
            () => Toast.show('수정본 복사 완료'),
            () => Toast.show('복사 실패', { error: true })
          );
        });
        document.getElementById('cmp-close').addEventListener('click', () => {
          this.renderViewer(p);
        });
      } catch (e) {
        ProblemView.setContent(`<div class="err-msg">${esc(e.message)}</div>`);
      }
    },

    async renderEditor(p) {
      const draft = State.getDraft(p);
      let initial;
      if (draft) {
        initial = draft.code;
      } else if (p.files.java) {
        try {
          if (!p._java) p._java = await Api.fetchFile(p.files.java);
          initial = p._java;
        } catch {
          initial = '';
        }
      } else {
        initial = '';
      }

      const lastSaved = draft ? new Date(draft.updatedAt).toLocaleString('ko-KR') : null;
      ProblemView.setContent(`
        <div class="code-wrap">
          <div class="code-header">
            <span class="code-lang">Java · 풀이 · 편집 중</span>
            <div class="code-actions">
              <span class="code-status" id="solution-status">${lastSaved ? '저장됨 · ' + esc(lastSaved) : '아직 저장 안 됨'}</span>
              <button class="reset-btn" id="solution-reset">초기화</button>
              <button class="seed-btn" id="solution-done">편집 종료</button>
            </div>
          </div>
          <textarea class="editor" id="solution-editor" placeholder="여기에 풀이를 작성하세요. 입력 시마다 자동 저장됩니다."></textarea>
        </div>
      `);

      const editor = document.getElementById('solution-editor');
      const status = document.getElementById('solution-status');
      editor.value = initial;
      editor.focus();

      // Code-editor keybindings: Tab/Shift+Tab indent, Enter auto-indent.
      const INDENT = '    '; // 4 spaces (matches user's existing solutions)
      editor.addEventListener('keydown', (e) => {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const v = editor.value;
        if (e.key === 'Tab') {
          e.preventDefault();
          if (start === end) {
            if (e.shiftKey) {
              const lineStart = v.lastIndexOf('\n', start - 1) + 1;
              const before = v.slice(lineStart, start);
              const m = before.match(/^( {1,4}|\t)/);
              if (m) {
                const len = m[0].length;
                editor.value = v.slice(0, lineStart) + before.slice(len) + v.slice(start);
                editor.selectionStart = editor.selectionEnd = start - len;
              }
            } else {
              editor.value = v.slice(0, start) + INDENT + v.slice(end);
              editor.selectionStart = editor.selectionEnd = start + INDENT.length;
            }
          } else {
            // Multi-line selection: indent/dedent each line
            const lineStart = v.lastIndexOf('\n', start - 1) + 1;
            const block = v.slice(lineStart, end);
            const before = v.slice(0, lineStart);
            const after = v.slice(end);
            let newBlock;
            if (e.shiftKey) {
              newBlock = block.split('\n').map(l => l.replace(/^( {1,4}|\t)/, '')).join('\n');
            } else {
              newBlock = block.split('\n').map(l => INDENT + l).join('\n');
            }
            editor.value = before + newBlock + after;
            editor.selectionStart = lineStart;
            editor.selectionEnd = lineStart + newBlock.length;
          }
          editor.dispatchEvent(new Event('input'));
        } else if (e.key === 'Enter' && start === end) {
          // Auto-indent: copy leading whitespace; add extra indent if line ends with '{'
          const lineStart = v.lastIndexOf('\n', start - 1) + 1;
          const currentLine = v.slice(lineStart, start);
          const im = currentLine.match(/^[ \t]*/);
          let indent = im ? im[0] : '';
          if (currentLine.trimEnd().endsWith('{')) indent += INDENT;
          e.preventDefault();
          const insertion = '\n' + indent;
          editor.value = v.slice(0, start) + insertion + v.slice(end);
          editor.selectionStart = editor.selectionEnd = start + insertion.length;
          editor.dispatchEvent(new Event('input'));
        }
      });

      let timer;
      editor.addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          if (editor.value.trim()) {
            State.setDraft(p, editor.value);
            status.textContent = '저장됨 · ' + new Date().toLocaleString('ko-KR');
          } else {
            State.deleteDraft(p);
            status.textContent = '아직 저장 안 됨 (비어있음)';
          }
          Sidebar.renderList();
        }, 250);
      });

      document.getElementById('solution-reset').addEventListener('click', () => {
        if (!confirm('편집 내용을 모두 비울까요? 원본 .java는 영향받지 않습니다.')) return;
        editor.value = '';
        State.deleteDraft(p);
        status.textContent = '아직 저장 안 됨 (비어있음)';
        Sidebar.renderList();
        Toast.show('편집 내용 비웠습니다');
      });

      document.getElementById('solution-done').addEventListener('click', () => {
        this._editing = false;
        this.renderViewer(p);
      });
    },
  };

  /* ========================================================
   * Toast — bottom-center fade message.
   * ======================================================== */
  const Toast = {
    show(msg, { error = false, ms = 1800 } = {}) {
      let el = document.querySelector('.toast');
      if (!el) {
        el = document.createElement('div');
        el.className = 'toast';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.classList.toggle('err', !!error);
      el.classList.add('show');
      clearTimeout(this._t);
      this._t = setTimeout(() => el.classList.remove('show'), ms);
    },
  };

  /* ========================================================
   * ImageArchive — load 백준/.assets/index.json once, then
   * rewrite img src in README HTML before insertion.
   * Falls back to original src on per-image failure (onerror).
   * ======================================================== */
  const ImageArchive = {
    map: null,

    async load() {
      try {
        const res = await fetch('백준/.assets/index.json');
        if (!res.ok) { this.map = {}; return; }
        this.map = await res.json();
      } catch {
        this.map = {};
      }
    },

    rewrite(html) {
      if (!this.map || !Object.keys(this.map).length) return html;
      return html.replace(/<img([^>]*)src=(["'])([^"']+)\2/gi, (m, attrs, q, url) => {
        const local = this.map[url];
        if (!local) return m;
        const safe = url.replace(/"/g, '&quot;');
        return `<img${attrs}src=${q}${local}${q} data-original-src="${safe}" onerror="this.onerror=null;this.src=this.dataset.originalSrc"`;
      });
    },
  };

  /* ========================================================
   * Topbar — stat chip (problem count + tree source) + refresh.
   * ======================================================== */
  const Topbar = {
    init() {
      document.getElementById('topbar-logo').addEventListener('click', async () => {
        App.goHome();
        await App.reloadTree({ force: true });
      });
      document.getElementById('jobs-btn')?.addEventListener('click', () => App.showJobs());
      document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
        State.pref.sidebarHidden = !State.pref.sidebarHidden;
        State.savePref();
        Topbar.applySidebar();
      });
      Topbar.applySidebar();
    },

    applySidebar() {

    },

    setChip(text, tone = '') {
